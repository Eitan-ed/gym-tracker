// ─── Roller ────────────────────────────────────────────────
const Roller = memo(({ value, onChange, min, max, step=1, label, isChanged }) => {
    const options = useMemo(() => {
        const o = [];
        for (let i = min; i <= max; i += step) o.push(i);
        return o;
    }, [min, max, step]);
    return (
        <div className="flex flex-col items-center flex-1">
            <span className="text-[8px] font-black text-slate-400 mb-1 uppercase tracking-tighter">{label}</span>
            <select value={value} onChange={e => onChange(parseFloat(e.target.value))}
                className={`w-full p-1.5 rounded-xl border-none text-center font-black text-base appearance-none outline-none transition-all
                    ${isChanged ? 'text-blue-600 ring-2 ring-blue-100 bg-blue-50' : 'bg-slate-100/60 text-slate-400 font-normal'}`}>
                {options.map(o => <option key={o} value={o}>{o}</option>)}
            </select>
        </div>
    );
});

// ─── VideoInput ────────────────────────────────────────────

                ▶ הוסף

}

// ─── ExerciseEntryRow ──────────────────────────────────────
function ExerciseEntryRow({ ex, logs, sessionStartTime, onSave, onFinish, isLast, isSuperset, restTimer, restTimerTotal }) {
    const [s1, setS1] = useState({ w:10, r:10, wC:false, rC:false });
    const [s2, setS2] = useState({ w:10, r:10, wC:false, rC:false });
    const [isSaving, setIsSaving] = useState(false);
    const set2Ref = React.useRef(null);

    const initialized = React.useRef(false);
    useEffect(() => {
        if (initialized.current || logs.length === 0) return;
        const last = [...logs].filter(l=>l.exId===ex.id)
            .sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp))[0];
        if (!last) return;
        setS1(p=>({...p, w:last.weight, r:last.reps}));
        setS2(p=>({...p, w:last.weight, r:last.reps}));
        initialized.current = true;
    }, [logs, ex.id]);

    useEffect(() => {
        initialized.current = false;
        setS1(p=>({...p,wC:false,rC:false}));
        setS2(p=>({...p,wC:false,rC:false}));
    }, [sessionStartTime]);

    const done = useMemo(() => ({
        s1: logs.some(l => l.exId===ex.id && l.setNum===1 && new Date(l.timestamp).getTime()>sessionStartTime),
        s2: logs.some(l => l.exId===ex.id && l.setNum===2 && new Date(l.timestamp).getTime()>sessionStartTime)
    }), [logs, ex.id, sessionStartTime]);

    const handleSetSave = async (num, state) => {
        setIsSaving(true);
        try {
            await onSave(ex.id, num, state.w, state.r, isSuperset);
            if (num === 1) {
                // sync s2 from s1 — reset Changed flags so they show gray
                setS2({w:state.w, r:state.r, wC:false, rC:false});
                setTimeout(()=> set2Ref.current?.scrollIntoView({behavior:'smooth', block:'center'}), 150);
            }
            if (num===2 && isLast) setTimeout(onFinish, 800);
        } finally {
            setIsSaving(false);
        }
    };

    // טיימר בין סט 1 לסט 2
    const betweenActive = done.s1 && !done.s2 && restTimer > 0;
    const betweenDone   = done.s1 && !done.s2 && restTimer === 0 && restTimerTotal > 0;
    const betweenShow   = betweenActive || betweenDone;
    // טיימר אחרי סט 2 (לקראת תרגיל הבא)
    const afterShow     = done.s2 && (restTimer > 0 || (restTimerTotal > 0 && restTimer === 0));

    // מד הפוך: מלא → ריק
    const timerBarWidth = restTimerTotal > 0 ? (betweenDone ? 0 : (restTimer / restTimerTotal) * 100) : 0;

    return (
        <div className="space-y-0" dir="rtl">
            {[1,2].map((num) => {
                const state    = num===1 ? s1 : s2;
                const setState = num===1 ? setS1 : setS2;
                const isDone   = num===1 ? done.s1 : done.s2;
                // disabled: רק אם לא עשינו סט 1. טיימר לא חוסם (אפשר לסמן במהלכו)
                const isDisabled = isDone || isSaving || (num===2 && !done.s1);
                // אפור ויזואלית גם בזמן טיימר פעיל (אך לחיץ)
                const isGray = isDisabled || (num===2 && betweenActive);
                return (
                    <React.Fragment key={num}>
                        <div ref={num===2 ? set2Ref : undefined}
                            className={`bg-white p-2.5 rounded-[1.6rem] border shadow-sm flex items-center gap-2
                                ${num===2 && betweenDone ? 'border-slate-700 shadow-md' : 'border-slate-100'}`}>
                            <div className={`w-10 h-10 text-white rounded-xl flex flex-col items-center justify-center shrink-0 shadow-lg
                                ${num===2 && betweenDone ? 'bg-blue-600' : 'bg-slate-900'}`}>
                                <span className="text-[7px] font-black uppercase tracking-tighter opacity-60">SET</span>
                                <span className="text-base font-black leading-none">{num}</span>
                            </div>
                            <div className="flex flex-1 gap-2">
                                <Roller label="ק״ג"   min={0} max={250} step={0.5} value={state.w} isChanged={state.wC} onChange={v=>setState(p=>({...p,w:v,wC:true}))} />
                                <Roller label="חזרות" min={1} max={120}            value={state.r} isChanged={state.rC} onChange={v=>setState(p=>({...p,r:v,rC:true}))} />
                            </div>
                            <button onClick={() => handleSetSave(num, state)} disabled={isDisabled}
                                className={`px-5 h-10 rounded-2xl flex items-center justify-center font-black text-sm transition-all shrink-0 shadow-lg active:scale-95
                                    ${isDone ? 'bg-slate-100 text-slate-300 shadow-none' : isGray ? 'bg-slate-100 text-slate-300 shadow-none' : 'bg-emerald-500 text-white shadow-emerald-200'}`}>
                                {isDone ? 'בוצע' : isSaving ? '...' : 'סיום'}
                            </button>
                        </div>

                        {/* טיימר בין סט 1 לסט 2 — מד הפוך (מלא לריק) */}
                        {num===1 && betweenShow && (
                            <div className="flex items-center gap-2 px-2 py-1.5">
                                <div className={`px-2.5 py-1 rounded-xl flex items-center gap-1.5 shrink-0 shadow text-white text-sm font-mono font-black
                                    ${betweenDone ? 'bg-emerald-500' : 'bg-blue-600'}`}>
                                    <Icon name="Clock" size={13} />
                                    <span>{betweenDone ? '✓' : restTimer}</span>
                                </div>
                                <div className="flex-1 h-2.5 bg-slate-100 rounded-full overflow-hidden">
                                    <div className={`h-full rounded-full transition-all duration-1000 ${betweenDone ? 'bg-emerald-500' : 'bg-blue-500'}`}
                                        style={{width:`${timerBarWidth}%`}} />
                                </div>
                            </div>
                        )}

                        {num===1 && !betweenShow && <div className="h-1.5" />}
                    </React.Fragment>
                );
            })}

            {/* טיימר אחרי סט 2 — מנוחה לקראת התרגיל הבא */}
            {afterShow && (
                <div className="flex items-center gap-2 px-2 py-1.5 mt-1">
                    <div className={`text-white px-2.5 py-1 rounded-xl flex items-center gap-1.5 shrink-0 shadow text-sm font-mono font-black
                        ${restTimer===0 ? 'bg-emerald-500' : 'bg-blue-600'}`}>
                        <Icon name="Clock" size={13} />
                        <span>{restTimer===0 ? '✓' : restTimer}</span>
                    </div>
                    <div className="flex-1 h-2.5 bg-slate-100 rounded-full overflow-hidden">
                        <div className={`h-full rounded-full transition-all duration-1000 ${restTimer===0 ? 'bg-emerald-500' : 'bg-blue-500'}`}
                            style={{width:`${restTimerTotal > 0 ? (restTimer / restTimerTotal) * 100 : 0}%`}} />
                    </div>
                </div>
            )}
        </div>
    );
}

};

// ─── VideoModal ─────────────────────────────────────────────
let _videoModalOpen = false;

const VideoModal = ({ src, onClose }) => {
    useEffect(()=>{
        _videoModalOpen = true;
        history.pushState({gym:'video'},'');
        const handler = ()=>{ _videoModalOpen = false; onClose(); };
        window.addEventListener('popstate', handler);
        return ()=>{ _videoModalOpen = false; window.removeEventListener('popstate', handler); };
    },[]);
    return (
        <div className="fixed inset-0 z-[600] bg-black/95 flex items-center justify-center p-4" onClick={onClose}>
            <button onClick={onClose}
                className="absolute top-5 left-5 w-11 h-11 bg-white/20 rounded-full flex items-center justify-center text-white z-10 active:bg-white/40">
                <Icon name="X" size={22} />
            </button>
            <video src={src} controls autoPlay muted playsInline
                className="max-w-full max-h-full rounded-xl shadow-2xl"
                onClick={e=>e.stopPropagation()} />
        </div>
    );
};

// ─── SingleSetRow ──────────────────────────────────────────
function SingleSetRow({ ex, setNum, state, setState, isDone, isDisabled, isSaving, onSave, isSecond }) {
    return (
        <div className={`flex items-center gap-2 p-2 rounded-2xl border ${isDone ? 'bg-slate-50 border-slate-100' : isSecond ? 'bg-red-50 border-red-100 shadow-sm' : 'bg-white border-slate-100 shadow-sm'}`}>
            <span className={`text-[11px] font-black shrink-0 w-[4.5rem] truncate leading-tight ${isSecond ? 'text-red-700' : 'text-slate-700'}`}>{ex.title}</span>
            <div className="flex flex-1 gap-1.5">
                <Roller label="ק״ג"   min={0}   max={250} step={0.5} value={state.w} isChanged={state.wC} onChange={v=>setState(p=>({...p,w:v,wC:true}))} />
                <Roller label="חזרות" min={1}   max={120}            value={state.r} isChanged={state.rC} onChange={v=>setState(p=>({...p,r:v,rC:true}))} />
            </div>
            <button onClick={()=>onSave(ex.id, setNum, state)} disabled={isDone||isDisabled||isSaving}
                className={`px-4 h-9 rounded-xl font-black text-sm transition-all shrink-0 active:scale-95
                    ${isDone ? 'bg-slate-100 text-slate-300' : (isDisabled||isSaving) ? 'bg-slate-100 text-slate-300' : 'bg-emerald-500 text-white shadow shadow-emerald-200'}`}>
                {isDone ? 'בוצע' : isSaving ? '...' : 'סיום'}
            </button>
        </div>
    );
}

// ─── SupersetSection ───────────────────────────────────────
function SupersetSection({ exA, exB, logs, sessionStartTime, onSave, onFinish, restTimers, restTimerTotals, notes, onSaveNote, images, onSaveImage, onRemoveImage, videos, onSaveVideo, onDeleteVideo, showDetails, setShowDetails, group, setLightbox, setVideoModal, playingVideos, setPlayingVideos }) {
    const [sA1, setSA1] = useState({w:10,r:10,wC:false,rC:false});
    const [sA2, setSA2] = useState({w:10,r:10,wC:false,rC:false});
    const [sB1, setSB1] = useState({w:10,r:10,wC:false,rC:false});
    const [sB2, setSB2] = useState({w:10,r:10,wC:false,rC:false});
    const [isSaving, setIsSaving] = useState(false);
    const initA = React.useRef(false), initB = React.useRef(false);

    useEffect(()=>{
        if (!initA.current && logs.length > 0) {
            const l = [...logs].filter(x=>x.exId===exA.id).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp))[0];
            if (l) { setSA1(p=>({...p,w:l.weight,r:l.reps})); setSA2(p=>({...p,w:l.weight,r:l.reps})); initA.current=true; }
        }
        if (!initB.current && logs.length > 0) {
            const l = [...logs].filter(x=>x.exId===exB.id).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp))[0];
            if (l) { setSB1(p=>({...p,w:l.weight,r:l.reps})); setSB2(p=>({...p,w:l.weight,r:l.reps})); initB.current=true; }
        }
    },[logs]);

    useEffect(()=>{ initA.current=false; initB.current=false; },[sessionStartTime]);

    const doneA1 = logs.some(l=>l.exId===exA.id&&l.setNum===1&&new Date(l.timestamp).getTime()>sessionStartTime);
    const doneB1 = logs.some(l=>l.exId===exB.id&&l.setNum===1&&new Date(l.timestamp).getTime()>sessionStartTime);
    const doneA2 = logs.some(l=>l.exId===exA.id&&l.setNum===2&&new Date(l.timestamp).getTime()>sessionStartTime);
    const doneB2 = logs.some(l=>l.exId===exB.id&&l.setNum===2&&new Date(l.timestamp).getTime()>sessionStartTime);

    const rtA = restTimers[exA.id]||0,     rtB = restTimers[exB.id]||0;
    const totA = restTimerTotals[exA.id]||0, totB = restTimerTotals[exB.id]||0;

    // disable לפי סדר: A1 → B1 → A2 → B2
    const disB1 = !doneA1 || rtA > 0;
    const disA2 = !doneB1 || rtB > 0;
    const disB2 = !doneA2 || rtA > 0;

    // מתי להציג טיימר בכל שלב
    const showTAB = doneA1 && !doneB1 && totA > 0;  // בין A1 ל-B1
    const showTBA = doneB1 && !doneA2 && totB > 0;  // בין B1 ל-A2
    const showTA2 = doneA2 && !doneB2 && totA > 0;  // בין A2 ל-B2

    const renderTimer = (rt, tot) => {
        if (!tot) return null;
        const done = rt===0;
        // מד הפוך: מלא → ריק
        const prog = tot > 0 ? (done ? 0 : (rt/tot)*100) : 0;
        return (
            <div className="flex items-center gap-2 px-1 py-1">
                <div className={`px-2.5 py-1 rounded-xl flex items-center gap-1.5 shrink-0 text-white text-sm font-mono font-black shadow ${done?'bg-emerald-500':'bg-blue-600'}`}>
                    <Icon name="Clock" size={13}/><span>{done?'✓':rt}</span>
                </div>
                <div className="flex-1 h-2.5 bg-slate-100 rounded-full overflow-hidden">
                    <div className={`h-full rounded-full transition-all duration-1000 ${done?'bg-emerald-500':'bg-blue-500'}`} style={{width:`${prog}%`}}/>
                </div>
            </div>
        );
    };

    const handleSave = async (exId, setNum, state) => {
        setIsSaving(true);
        try {
            await onSave(exId, setNum, state.w, state.r, true);
            if (exId===exA.id && setNum===1) setSA2({w:state.w,r:state.r,wC:false,rC:false});
            if (exId===exB.id && setNum===1) setSB2({w:state.w,r:state.r,wC:false,rC:false});
            if (exId===exB.id && setNum===2) setTimeout(onFinish, 800);
        } finally { setIsSaving(false); }
    };

    // פרטי תרגיל (תמונה + how-to + היסטוריה)
    const renderDetails = (ex) => {
        const imgSrc = images?.[ex.id];
        const staticImg = EXERCISE_IMAGES[ex.id];
        const dispImg = imgSrc || (staticImg ? `images/${staticImg}` : null);
        const isPersonal = !!imgSrc;
        const youtubeId = videos?.[ex.id];
        const localVid  = EXERCISE_VIDEOS[ex.id];
        const hasVideo  = youtubeId || localVid;
        const history   = logs.filter(l=>l.exId===ex.id).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)).slice(0,6);
        return (
            <div key={ex.id} id={`ex-row-${ex.id}`} className="mb-3">
                {/* תמונה + וידאו */}
                <div className="flex gap-2 mb-2">
                    {dispImg && (
                        <div className="relative flex-1 min-w-0">
                            <img src={dispImg} alt={ex.title} onClick={()=>setLightbox(dispImg)}
                                className="w-full rounded-2xl object-cover shadow cursor-pointer active:opacity-80" style={{maxHeight:'7rem'}}/>
                            {isPersonal && <button onClick={()=>onRemoveImage(ex.id)} className="absolute top-1.5 left-1.5 bg-white/90 text-red-400 rounded-full px-2 py-0.5 text-[9px] font-black shadow">הסר</button>}
                        </div>
                    )}
                    {hasVideo && (
                        <div className={`flex flex-col ${dispImg?'w-[35%] shrink-0':'flex-1'}`}>
                            {youtubeId ? (
                                <div className="flex flex-col gap-1 h-full">
                                    <a href={`https://youtu.be/${youtubeId}`} target="_blank" rel="noopener noreferrer"
                                        className="flex-1 flex flex-col items-center justify-center gap-1 bg-red-50 border border-red-200 text-red-600 rounded-2xl font-black active:scale-95" style={{minHeight:'4rem'}}>
                                        <span className="text-xl">▶</span><span className="text-[10px]">YouTube</span>
                                    </a>
                                    <button onClick={()=>onDeleteVideo(ex.id)} className="text-[9px] font-black text-slate-300 active:text-red-400 text-center py-0.5">הסר</button>
                                </div>
                            ) : (
                                        <button onClick={()=>setVideoModal?.(`videos/${localVid}`)}
                                        className="flex-1 flex flex-col items-center justify-center gap-1 bg-slate-800 border border-slate-700 text-white rounded-2xl font-black active:scale-95" style={{minHeight:'4rem'}}>
                                        <span className="text-xl">▶</span><span className="text-[10px]">סרטון</span>
                                    </button>
                            )}
                        </div>
                    )}
                </div>
                {!dispImg && (
                    <label className="flex items-center gap-1.5 text-[11px] font-black text-slate-400 cursor-pointer mb-1">
                        <input type="file" accept="image/*" className="hidden" onChange={e=>onSaveImage(ex.id,e.target.files[0])}/> 📷 הוסף תמונה שלך
                    </label>
                )}
                {!youtubeId && <VideoInput exId={ex.id} onSave={onSaveVideo}/>}

                {/* כותרת + how-to מקופל */}
                <section className="bg-slate-50 rounded-2xl border border-slate-100 mb-2 overflow-hidden">
                    <button onClick={()=>setShowDetails(p=>({...p,[ex.id]:!p[ex.id]}))}
                        className="w-full flex justify-between items-center px-3 py-2 active:bg-slate-100">
                        <span className="text-[13px] font-black text-slate-800">{ex.title}</span>
                        <div className="flex items-center gap-1.5">
                            <span className="bg-slate-200 px-2 py-0.5 rounded-full text-[9px] font-black text-slate-600">{group.machine}</span>
                            <Icon name={showDetails[ex.id]?'ChevronUp':'ChevronDown'} size={14} className="text-slate-400"/>
                        </div>
                    </button>
                    {showDetails[ex.id] && (
                        <div className="px-3 pb-3">
                            <p className="text-[12px] text-slate-600 bg-white/60 p-2.5 rounded-xl border border-slate-200/50 mb-2 font-medium">{ex.howTo}</p>
                            <div className="flex flex-wrap gap-1.5 mb-2">
                                {ex.tips.map((t,i)=>(
                                    <div key={i} className="bg-white p-1.5 rounded-xl border border-slate-100 text-[10px] text-slate-600 flex items-center gap-1.5 shadow-sm">
                                        <Icon name="CheckCircle2" size={12} className="text-emerald-500 shrink-0"/><span className="font-bold">{t}</span>
                                    </div>
                                ))}
                            </div>
                            <textarea defaultValue={notes?.[ex.id]||''} onBlur={e=>onSaveNote(ex.id,e.target.value)}
                                placeholder="הוסף דגשים..." rows={notes?.[ex.id]?(notes[ex.id].split('\n').length+1):2}
                                className="w-full bg-amber-50/60 border border-amber-200/60 rounded-xl p-2 text-[12px] font-bold text-slate-700 outline-none focus:ring-2 focus:ring-amber-400 resize-none"/>
                        </div>
                    )}
                    {!showDetails[ex.id] && notes?.[ex.id] && (
                        <div className="px-3 pb-2">
                            <textarea defaultValue={notes[ex.id]} onBlur={e=>onSaveNote(ex.id,e.target.value)}
                                rows={notes[ex.id].split('\n').length+1}
                                className="w-full bg-amber-50/60 border border-amber-200/60 rounded-xl p-2 text-[12px] font-bold text-slate-700 outline-none focus:ring-2 focus:ring-amber-400 resize-none"/>
                        </div>
                    )}
                </section>

                {/* היסטוריה */}
                {history.length > 0 && (
                    <section className="flex gap-1.5 mb-1 overflow-x-auto no-scrollbar py-0.5">
                        {history.map((h,i)=>(
                            <div key={i} className={`p-2 rounded-xl border shrink-0 text-[10px] ${i<2?'bg-indigo-50/80 border-indigo-200 shadow-sm':'bg-slate-50/50 border-slate-100 opacity-70'}`}>
                                <span className={`font-bold block ${i<2?'text-indigo-500':'text-slate-400'}`}>{new Date(h.timestamp).toLocaleDateString('he-IL')}</span>
                                <span className={`font-black ${i<2?'text-indigo-900':'text-slate-600'}`}>סט {h.setNum}: {h.weight}kg×{h.reps}</span>
                            </div>
                        ))}
                    </section>
                )}
            </div>
        );
    };

    return (
        <div>
            {renderDetails(exA)}
            {renderDetails(exB)}

            {/* ─── סט 1 ─── */}
            <div className="bg-slate-50 rounded-2xl p-2.5 border border-slate-100 mb-2">
                <div className="text-[10px] font-black text-slate-400 uppercase tracking-wide mb-2 px-1">סט 1</div>
                <div className="space-y-1.5">
                    <SingleSetRow ex={exA} setNum={1} state={sA1} setState={setSA1} isDone={doneA1} isDisabled={false}  isSaving={isSaving} onSave={handleSave}/>
                    {showTAB && renderTimer(rtA, totA)}
                    <SingleSetRow ex={exB} setNum={1} state={sB1} setState={setSB1} isDone={doneB1} isDisabled={disB1} isSaving={isSaving} onSave={handleSave} isSecond/>
                </div>
            </div>

            {showTBA && <div className="mb-2">{renderTimer(rtB, totB)}</div>}

            {/* ─── סט 2 ─── */}
            <div className="bg-slate-50 rounded-2xl p-2.5 border border-slate-100">
                <div className="text-[10px] font-black text-slate-400 uppercase tracking-wide mb-2 px-1">סט 2</div>
                <div className="space-y-1.5">
                    <SingleSetRow ex={exA} setNum={2} state={sA2} setState={setSA2} isDone={doneA2} isDisabled={disA2} isSaving={isSaving} onSave={handleSave}/>
                    {showTA2 && renderTimer(rtA, totA)}
                    <SingleSetRow ex={exB} setNum={2} state={sB2} setState={setSB2} isDone={doneB2} isDisabled={disB2} isSaving={isSaving} onSave={handleSave} isSecond/>
                </div>
            </div>
        </div>
    );
}

                const prevDoneS2 = prevEx ? logs.some(l=>l.exId===prevEx.id&&l.setNum===2&&new Date(l.timestamp).getTime()>sessionStartTime) : false;
                const showPrevTimer = prevDoneS2 && prevTot > 0;

                                </div>

                                </div>
                            </button>
                            {showDetails[ex.id] && (

// ─── Backup helper ─────────────────────────────────────────
const triggerBackupDownload = data => {
    const blob = new Blob([JSON.stringify(data)], {type:'application/json'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    a.download = `gym-backup-${new Date().toLocaleDateString('he-IL').replace(/\./g,'-')}.json`;
    a.click();
    URL.revokeObjectURL(url);
};

// ─── Sound helpers ─────────────────────────────────────────
const playCountdownBeep = () => {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = 660; osc.type = 'sine';
        gain.gain.setValueAtTime(0.25, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
        osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.12);
    } catch(e) {}
};
const playRestCompleteSound = () => {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        [500, 700, 900].forEach((freq, i) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.frequency.value = freq; osc.type = 'sine';
            gain.gain.setValueAtTime(0.35, ctx.currentTime + i * 0.18);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.18 + 0.15);
            osc.start(ctx.currentTime + i * 0.18);
            osc.stop(ctx.currentTime + i * 0.18 + 0.18);
        });
    } catch(e) {}
};

// ─── ManageView ────────────────────────────────────────────
const ManageView = ({ logs, notes, images, videos, settings, sessionStartTime, sessionEndTime, groupOrder, onBack, onUpdateSettings, requestConfirm, showToast, setLogs, setNotes, setImages, setVideos, setSessionStartTime, setSessionEndTime, setGroupOrder }) => {
    const handleBackup = () => {
        triggerBackupDownload({
            logs, notes, images, videos, settings, groupOrder,
            sessionStart:   sessionStartTime,
            sessionEnd:     sessionEndTime,
            lastWorkoutSec: LS.get('gym-last-workout-sec', 0)
        });
        showToast('הגיבוי הורד בהצלחה');
    };

    const handleRestore = e => {
        const file = e.target.files[0];
        if (!file) return;
        requestConfirm('שחזור ימחוק את כל הנתונים הקיימים. להמשיך?', () => {
            const reader = new FileReader();
            reader.onload = ev => {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (!data.logs) throw new Error();
                    if (data.logs)           setLogs(data.logs);
                    if (data.notes)          setNotes(data.notes);
                    if (data.images)         setImages(data.images);
                    if (data.videos)         setVideos(data.videos);
                    if (data.settings)       onUpdateSettings('_bulk', data.settings);
                    if (data.sessionStart)   setSessionStartTime(data.sessionStart);
                    if (data.sessionEnd)     setSessionEndTime(data.sessionEnd);
                    if (data.groupOrder)     setGroupOrder(data.groupOrder);
                    if (data.lastWorkoutSec) LS.set('gym-last-workout-sec', data.lastWorkoutSec);
                    showToast('הנתונים שוחזרו בהצלחה');
                } catch { showToast('שגיאה בשחזור', true); }
            };
            reader.readAsText(file);
        }, () => { e.target.value = null; });
    };

    return (
        <div className="flex flex-col h-screen bg-slate-50 overflow-hidden fade-in" dir="rtl">
            <div className="bg-slate-900 p-5 pt-6 rounded-b-[2.5rem] shadow-xl relative shrink-0">
                <button onClick={onBack} className="absolute top-4 left-6 p-2.5 bg-white/20 rounded-full text-white active:scale-90 shadow-lg"><Icon name="Home" size={22} /></button>
                <h2 className="text-xl font-black text-white text-center">ניהול והגדרות</h2>
            </div>
            <div className="flex-1 overflow-y-auto p-4 space-y-6 no-scrollbar pb-32">
                <section className="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100">
                    <h3 className="text-lg font-black text-slate-800 mb-4 flex items-center gap-2"><Icon name="Database" size={20} className="text-blue-500" /> גיבוי ושחזור</h3>
                    <div className="space-y-4">
                        <button onClick={handleBackup} className="w-full flex items-center gap-3 bg-blue-50 p-4 rounded-2xl border border-blue-100 text-blue-700 active:scale-[0.98]">
                            <div className="bg-blue-100 p-2 rounded-xl"><Icon name="Download" size={20} /></div>
                            <div><div className="font-black text-sm">גיבוי נתונים</div><div className="text-[10px] font-bold opacity-70">הורדת קובץ למכשיר</div></div>
                        </button>
                        <label className="w-full flex items-center gap-3 bg-indigo-50 p-4 rounded-2xl border border-indigo-100 text-indigo-700 cursor-pointer active:scale-[0.98]">
                            <div className="bg-indigo-100 p-2 rounded-xl"><Icon name="Upload" size={20} /></div>
                            <div><div className="font-black text-sm">שחזור נתונים</div><div className="text-[10px] font-bold opacity-70">העלאת קובץ גיבוי</div></div>
                            <input type="file" accept=".json" className="hidden" onChange={handleRestore} />
                        </label>
                    </div>
                </section>
                <section className="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100">
                    <h3 className="text-lg font-black text-slate-800 mb-4 flex items-center gap-2"><Icon name="Settings" size={20} className="text-blue-500" /> הגדרות אימון</h3>
                    <div className="space-y-4">
                        {[
                            {label:'מנוחה לסט רגיל',  key:'normalRest',   opts:[60,90,120,150,180]},
                            {label:'מנוחה לסופר-סט',  key:'supersetRest', opts:[30,45,60,90,120]}
                        ].map(({label,key,opts})=>(
                            <div key={key} className="flex justify-between items-center bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                <span className="font-bold text-sm text-slate-700">{label}</span>
                                <select className="bg-white border border-slate-200 rounded-xl px-3 py-1 font-black text-blue-600 outline-none"
                                    value={settings[key]} onChange={e=>onUpdateSettings(key,Number(e.target.value))}>
                                    {opts.map(o=>{
                                        const m = Math.floor(o/60), s = o%60;
                                        const label = s===0 ? `${m} דק'` : m>0 ? `${m}:${String(s).padStart(2,'0')} דק'` : `${s} שנ'`;
                                        return <option key={o} value={o}>{label}</option>;
                                    })}
                                </select>
                            </div>
                        ))}
                    </div>
                </section>
            </div>
        </div>
    );
};


// ─── App ───────────────────────────────────────────────────
function App() {
    const [view,             setView]             = useState('list');
    const [activeGroup,      setActiveGroup]      = useState(null);
    const [logs,             setLogs]             = useState(()=>LS.get('gym-logs',[]));
    const [workoutSec,       setWorkoutSec]       = useState(0);
    const [isWorkoutActive,  setIsWorkoutActive]  = useState(false);
    const [restTimers,       setRestTimers]       = useState({});
    const [restTimerTotals, setRestTimerTotals]   = useState({});
    const [groupOrder,       setGroupOrder]       = useState(()=>{
        const saved = LS.get('gym-group-order', null);
        if (saved && saved.length === exerciseGroups.length) return saved;
        return exerciseGroups.map(g=>g.id);
    });
    const [sessionStartTime, setSessionStartTime] = useState(()=>LS.get('gym-session-start', Date.now()));
    const [sessionEndTime,   setSessionEndTime]   = useState(()=>LS.get('gym-session-end', null));
    const [editingDates,     setEditingDates]     = useState(null);
    const [scrollToExId,     setScrollToExId]     = useState(null);
    const [confirmAction,    setConfirmAction]    = useState(null);
    const [toast,            setToast]            = useState(null);
    const [notes,            setNotes]            = useState(()=>LS.get('gym-notes',{}));
    const [images,           setImages]           = useState(()=>LS.get('gym-images',{}));
    const [videos,           setVideos]           = useState(()=>LS.get('gym-videos',{}));
    const [settings,         setSettings]         = useState(()=>LS.get('gym-settings',{normalRest:90,supersetRest:60}));

    const requestConfirm = useCallback((text,onConfirm,onCancel)=>setConfirmAction({text,onConfirm,onCancel}),[]);
    const showToast      = useCallback((msg,isError=false)=>{ setToast({msg,isError}); setTimeout(()=>setToast(null),2500); },[]);

    // שמירה אוטומטית ב-localStorage
    useEffect(()=>{ LS.set('gym-logs',           logs);             },[logs]);
    useEffect(()=>{ LS.set('gym-notes',          notes);            },[notes]);
    useEffect(()=>{ LS.set('gym-images',         images);           },[images]);
    useEffect(()=>{ LS.set('gym-videos',         videos);           },[videos]);
    useEffect(()=>{ LS.set('gym-settings',       settings);         },[settings]);
    useEffect(()=>{ LS.set('gym-group-order',    groupOrder);       },[groupOrder]);
    useEffect(()=>{ LS.set('gym-session-start',  sessionStartTime); },[sessionStartTime]);
    useEffect(()=>{ LS.set('gym-session-end',    sessionEndTime);   },[sessionEndTime]);

    // גיבוי יומי אוטומטי
    useEffect(()=>{
        const last = LS.get('gym-last-backup', 0);
        if (Date.now() - last > 86400000) {
            triggerBackupDownload({
                logs:          LS.get('gym-logs',           []),
                notes:         LS.get('gym-notes',          {}),
                images:        LS.get('gym-images',         {}),
                videos:        LS.get('gym-videos',         {}),
                settings:      LS.get('gym-settings',       {normalRest:90,supersetRest:60}),
                sessionStart:  LS.get('gym-session-start',  null),
                sessionEnd:    LS.get('gym-session-end',    null),
                groupOrder:    LS.get('gym-group-order',    null),
                lastWorkoutSec:LS.get('gym-last-workout-sec',0)
            });
            LS.set('gym-last-backup', Date.now());
        }
    },[]);

    // חסימת כפתור חזרה של הטלפון במסך תרגיל
    useEffect(()=>{
        if (view!=='detail') return;
        history.pushState(null,'');
        const handler = ()=>{
            if (_videoModalOpen) return;
            setView('list'); setActiveGroup(null);
        };
        window.addEventListener('popstate', handler);
        return ()=>window.removeEventListener('popstate', handler);
    },[view]);

    // Timers
    useEffect(()=>{
        if (!isWorkoutActive) return;
        const t = setInterval(()=>setWorkoutSec(s=>s+1),1000);
        return ()=>clearInterval(t);
    },[isWorkoutActive]);

    // ref לגישה מה-interval ללא closure ישן
    const restTimersRef = React.useRef({});
    useEffect(()=>{ restTimersRef.current = restTimers; },[restTimers]);

    useEffect(()=>{
        const t = setInterval(()=>{
            const cur = restTimersRef.current;
            if (Object.keys(cur).length === 0) return;
            const next = {};
            let doBeep = false, completedExId = null;
            Object.entries(cur).forEach(([k,v])=>{
                if (v > 1) {
                    next[k] = v - 1;
                    if (v <= 4) doBeep = true;
                } else if (v === 1) {
                    completedExId = k;
                }
            });
            if (doBeep)        playCountdownBeep();
            if (completedExId) {
                playRestCompleteSound();
                const targetGroup = exerciseGroups.find(g => g.exercises.some(e => e.id === completedExId));
                if (targetGroup) { setActiveGroup(targetGroup); setView('detail'); }
                setScrollToExId(completedExId);
            }
            setRestTimers(next);
        },1000);
        return ()=>clearInterval(t);
    },[]);

    const handleUpdateSettings = (key,value) => {
        const newSettings = key==='_bulk' ? value : {...settings,[key]:value};
        setSettings(newSettings);
    };

    const playSetCompleteSound = () => {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const now = ctx.currentTime;
            const notes = [800, 600, 800];
            const duration = 0.1;
            notes.forEach((freq, i) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.value = freq;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.3, now + i*duration);
                gain.gain.exponentialRampToValueAtTime(0.01, now + i*duration + duration*0.8);
                osc.start(now + i*duration);
                osc.stop(now + i*duration + duration);
            });
        } catch (e) {}
    };

    const handleSaveSet = (exId,setNum,weight,reps,isSuperset) => {
        const newLog = {id:crypto.randomUUID(), exId, setNum, weight, reps, timestamp:new Date().toISOString()};
        setLogs(prev=>[...prev, newLog]);
        const dur = isSuperset ? settings.supersetRest : settings.normalRest;
        setRestTimers({[exId]: dur});
        setRestTimerTotals(prev => ({...prev, [exId]: dur}));
    };

    const handleSaveNote = (exId,text) => {
        setNotes(prev=>({...prev,[exId]:text}));
    };

    const handleSaveVideo = (exId, url) => {
        if (!url.trim()) return;
        const match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([A-Za-z0-9_-]{11})/);
        const videoId = match ? match[1] : null;
        if (!videoId) { showToast('קישור YouTube לא תקין', true); return; }
        setVideos(prev=>({...prev,[exId]:videoId}));
        showToast('הסרטון נשמר');
    };

    const handleDeleteVideo = (exId) => {
        setVideos(prev=>{ const n={...prev}; delete n[exId]; return n; });
        showToast('הסרטון הוסר');
    };

    const handleRemoveImage = (exId) => {
        setImages(prev=>{ const n={...prev}; delete n[exId]; return n; });
        showToast('התמונה הוסרה');
    };

    const handleSaveImage = (exId, file) => {
        if (!file) return;
        showToast('טוען תמונה...');
        const canvas = document.createElement('canvas');
        const ctx    = canvas.getContext('2d');
        const img    = new Image();
        const reader = new FileReader();
        reader.onload = ev => {
            img.onload = () => {
                const MAX = 800;
                const ratio = Math.min(MAX/img.width, MAX/img.height, 1);
                canvas.width  = Math.round(img.width  * ratio);
                canvas.height = Math.round(img.height * ratio);
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                const url = canvas.toDataURL('image/jpeg', 0.8);
                setImages(prev=>({...prev,[exId]:url}));
                showToast('התמונה נשמרה');
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    };

    const startNewWorkout = ()=>{
        setWorkoutSec(0); setIsWorkoutActive(false); setRestTimers({}); setRestTimerTotals({});
        setSessionStartTime(Date.now()); setView('list'); setActiveGroup(null);
    };

    const handleDeleteLog  = id=>{
        setLogs(prev=>prev.filter(l=>l.id!==id));
        showToast('הרשומה נמחקה');
    };
    const handleDeleteDate = items=>{
        const ids = new Set(items.map(i=>i.id));
        setLogs(prev=>prev.filter(l=>!ids.has(l.id)));
        showToast('יום האימון נמחק');
    };

    const sortedGroups = useMemo(()=>
        groupOrder.map(id=>exerciseGroups.find(g=>g.id===id)).filter(Boolean)
    ,[groupOrder]);

    const handleMoveGroup = (idx, dir) => {
        setGroupOrder(prev=>{
            const next = [...prev];
            const target = idx + dir;
            if (target < 0 || target >= next.length) return prev;
            [next[idx], next[target]] = [next[target], next[idx]];
            return next;
        });
    };

    const isGroupDone = useCallback((g)=>
        g.exercises.every(ex=>{
            const sl = logs.filter(l=>l.exId===ex.id && new Date(l.timestamp).getTime()>sessionStartTime);
            return sl.some(l=>l.setNum===1) && sl.some(l=>l.setNum===2);
        })
    ,[logs,sessionStartTime]);

    const completedCount    = useMemo(()=>sortedGroups.filter(isGroupDone).length,          [sortedGroups,isGroupDone]);
    const nextIncompleteIndex = useMemo(()=>sortedGroups.findIndex(g=>!isGroupDone(g)),     [sortedGroups,isGroupDone]);

    useEffect(()=>{
        if (view!=='list') return;
        setTimeout(()=>{
            const idx = nextIncompleteIndex>0 ? nextIncompleteIndex-1 : 0;
            document.getElementById(`ex-btn-${idx}`)?.scrollIntoView({behavior:'smooth',block:'center'});
        },250);
    },[view,nextIncompleteIndex]);

    const handleExerciseComplete = useCallback(()=>{
        const nextGroup = sortedGroups.find(g=>!isGroupDone(g));
        if (nextGroup) {
            // חזור לרשימה — הטיימר ממשיך לרוץ
            setView('list');
            setActiveGroup(null);
        } else {
            setIsWorkoutActive(false);
            LS.set('gym-last-workout-sec', workoutSec);
            setView('list');
            setActiveGroup(null);
        }
    },[sortedGroups,isGroupDone,workoutSec]);

    const handleOpenExercise = group=>{
        if (workoutSec===0&&!isWorkoutActive) {
            requestConfirm('להפעיל טיימר?',
                ()=>{ setIsWorkoutActive(true); setActiveGroup(group); setView('detail'); },
                ()=>{                           setActiveGroup(group); setView('detail'); }
            );
        } else { setActiveGroup(group); setView('detail'); }
    };

    // Overlays — תמיד מעל
    const overlays = (
        <>
            {confirmAction && (
                <div className="fixed inset-0 z-[999] bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4" dir="rtl">
                    <div className="bg-white rounded-3xl p-6 w-full max-w-xs shadow-2xl">
                        <h3 className="text-lg font-black text-slate-800 mb-5 text-center">{confirmAction.text}</h3>
                        <div className="flex gap-3">
                            <button onClick={()=>{ confirmAction.onCancel?.(); setConfirmAction(null); }} className="flex-1 p-3 rounded-xl font-bold text-slate-500 bg-slate-100 active:scale-95">ביטול</button>
                            <button onClick={()=>{ confirmAction.onConfirm(); setConfirmAction(null); }} className="flex-1 p-3 rounded-xl font-bold text-white bg-blue-600 active:scale-95">אישור</button>
                        </div>
                    </div>
                </div>
            )}
            {/* תיקון 5: AlertCircle לשגיאה, CheckCircle2 להצלחה */}
            {toast && (
                <div className="fixed bottom-24 left-1/2 -translate-x-1/2 z-[1000] w-[90%] max-w-[300px]">
                    <div className={`px-5 py-3 rounded-2xl shadow-2xl font-black text-sm flex items-center justify-center gap-2 ${toast.isError?'bg-rose-500':'bg-emerald-500'} text-white`}>
                        <Icon name={toast.isError?'AlertCircle':'CheckCircle2'} size={20} /> {toast.msg}
                    </div>
                </div>
            )}
            {/* Modal עריכת תאריכים */}
            {editingDates && (
                <div className="fixed inset-0 z-[999] bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4" dir="rtl">
                    <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl space-y-4">
                        <h3 className="text-lg font-black text-slate-800 text-center">עדכון תאריכים</h3>
                        <div className="space-y-3">
                            <div>
                                <label className="block text-sm font-bold text-slate-600 mb-2">תאריך התחלה</label>
                                <input type="date" value={new Date(editingDates.start).toISOString().split('T')[0]}
                                    onChange={e=>{
                                        const newStart = new Date(e.target.value).getTime();
                                        const oldStart = new Date(editingDates.start).getTime();
                                        const diff = newStart - oldStart;
                                        setEditingDates({
                                            start: newStart,
                                            end: editingDates.end ? editingDates.end + diff : newStart
                                        });
                                    }}
                                    className="w-full p-3 border border-slate-200 rounded-2xl font-bold text-slate-800" />
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-slate-600 mb-2">הוסף חודשים</label>
                                <input type="number" min="0" placeholder="0"
                                    onChange={e=>{
                                        const months = parseInt(e.target.value) || 0;
                                        const start = new Date(editingDates.start);
                                        const end = new Date(start);
                                        end.setMonth(end.getMonth() + months);
                                        setEditingDates({...editingDates, end: end.getTime()});
                                    }}
                                    className="w-full p-3 border border-slate-200 rounded-2xl font-bold text-slate-800" />
                            </div>
                            <div className="pt-2 bg-blue-50 p-3 rounded-2xl">
                                <div className="text-sm font-bold text-slate-600 mb-1">תאריך סוף צפוי:</div>
                                <div className="text-lg font-black text-blue-600">
                                    {editingDates.end ? new Date(editingDates.end).toLocaleDateString('he-IL') : 'לא הוגדר'}
                                </div>
                            </div>
                        </div>
                        <div className="flex gap-3 pt-2">
                            <button onClick={()=>setEditingDates(null)} className="flex-1 p-3 rounded-xl font-bold text-slate-500 bg-slate-100 active:scale-95">ביטול</button>
                            <button onClick={()=>{
                                setSessionStartTime(editingDates.start);
                                setSessionEndTime(editingDates.end);
                                setEditingDates(null);
                                showToast('תאריכים עודכנו');
                            }} className="flex-1 p-3 rounded-xl font-bold text-white bg-blue-600 active:scale-95">שמור</button>
                        </div>
                    </div>
                </div>
            )}
        </>
    );

    if (view==='detail'&&activeGroup) return <>{overlays}<DetailView group={activeGroup} logs={logs} restTimers={restTimers} restTimerTotals={restTimerTotals} sessionStartTime={sessionStartTime} notes={notes} onSaveNote={handleSaveNote} images={images} onSaveImage={handleSaveImage} onRemoveImage={handleRemoveImage} videos={videos} onSaveVideo={handleSaveVideo} onDeleteVideo={handleDeleteVideo} onBack={()=>{setView('list');setActiveGroup(null);}} onFinish={handleExerciseComplete} onSave={handleSaveSet} scrollToExId={scrollToExId} onScrollDone={()=>setScrollToExId(null)} /></>;
    if (view==='history') return <>{overlays}<HistoryView logs={logs} onBack={()=>setView('list')} onDeleteDate={handleDeleteDate} onDeleteOne={handleDeleteLog} requestConfirm={requestConfirm} /></>;
    if (view==='manage')  return <>{overlays}<ManageView  logs={logs} notes={notes} images={images} videos={videos} settings={settings} sessionStartTime={sessionStartTime} sessionEndTime={sessionEndTime} groupOrder={groupOrder} onUpdateSettings={handleUpdateSettings} onBack={()=>setView('list')} requestConfirm={requestConfirm} showToast={showToast} setLogs={setLogs} setNotes={setNotes} setImages={setImages} setVideos={setVideos} setSessionStartTime={setSessionStartTime} setSessionEndTime={setSessionEndTime} setGroupOrder={setGroupOrder} /></>;

    // List view
    return (
        <>
        {overlays}
        <div className="max-w-md mx-auto h-screen bg-slate-50 flex flex-col overflow-hidden shadow-2xl relative" dir="rtl">
            <header className="bg-white pb-6 rounded-b-[2.5rem] shadow-sm sticky top-0 z-10 border-b border-slate-100 shrink-0">
                <div className="w-full mb-6 relative overflow-hidden" style={{background:'linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#0f172a 100%)'}}>
                    <div className="absolute inset-0 opacity-10" style={{backgroundImage:'repeating-linear-gradient(45deg,#fff 0,#fff 1px,transparent 0,transparent 50%)',backgroundSize:'12px 12px'}}/>
                    <div className="relative py-5 px-4 flex flex-col items-center gap-1">
                        <div className="flex items-center gap-2">
                            <Icon name="Dumbbell" size={20} className="text-blue-400" />
                            <h1 className="text-2xl font-black text-white tracking-widest" style={{letterSpacing:'0.15em'}}>אימון פול-באדי</h1>
                            <Icon name="Dumbbell" size={20} className="text-blue-400" />
                        </div>
                        <div className="h-[2px] w-24 rounded-full bg-gradient-to-r from-transparent via-blue-400 to-transparent"/>
                    </div>
                    <span className="absolute bottom-1.5 left-3 text-[9px] text-white/30 font-bold" dir="ltr">v.{APP_VERSION}</span>
                </div>
                {(() => {
                    const start = new Date(sessionStartTime);
                    const end = sessionEndTime ? new Date(sessionEndTime) : null;
                    const now = new Date();
                    const daysTotal = end ? Math.floor((end - start) / (1000*60*60*24)) : 0;
                    const daysPassed = end ? Math.floor((now - start) / (1000*60*60*24)) : 0;
                    const daysRemaining = Math.max(0, daysTotal - daysPassed);
                    const progress = daysTotal > 0 ? Math.min(100, (daysPassed / daysTotal) * 100) : 0;
                    const timerStr = `${String(Math.floor(workoutSec/60)).padStart(2,'0')}:${String(workoutSec%60).padStart(2,'0')}`;

                    return (
                        <div className="px-4 mb-4 mt-2 flex items-stretch gap-3">
                            {/* שעון */}
                            {/* שעון — רקע זהה לתאריכים */}
                            <div className={`flex flex-col items-center justify-center gap-2 rounded-2xl px-4 py-3 border shrink-0 transition-all
                                ${isWorkoutActive
                                    ? 'bg-blue-600 border-blue-500 text-white'
                                    : 'bg-gradient-to-br from-blue-50 to-indigo-50 border-blue-100 text-slate-700'}`}>
                                <button onClick={()=>setIsWorkoutActive(v=>!v)} className="flex flex-col items-center gap-1 active:scale-95 transition-transform">
                                    <Icon name={isWorkoutActive?'Pause':'Play'} size={18} />
                                    <span className="font-mono text-[15px] font-black tracking-widest leading-none" dir="ltr">{timerStr}</span>
                                </button>
                                <button onClick={()=>requestConfirm('לאפס סטופר?',()=>setWorkoutSec(0))}
                                    className={`text-[13px] font-bold flex items-center gap-1 px-2 py-1 rounded-full transition-colors
                                        ${isWorkoutActive ? 'bg-white/20 text-white' : 'bg-blue-100 text-blue-500'}`}>
                                    <Icon name="RotateCcw" size={11} /> אפס
                                </button>
                            </div>

                            {/* תאריכים + מד */}
                            <div onClick={()=>setEditingDates({start:sessionStartTime,end:sessionEndTime})}
                                className="flex-1 rounded-2xl bg-gradient-to-br from-blue-50 to-indigo-50 border border-blue-100 px-4 py-3 cursor-pointer active:scale-[0.98] transition-all touch-manipulation select-none"
                                style={{WebkitUserSelect:'none'}}>
                                <div className="flex justify-between items-start mb-2">
                                    <div>
                                        <div className="text-[9px] font-bold text-blue-400 uppercase tracking-wide mb-0.5">התחלה</div>
                                        <div className="text-[15px] font-black text-slate-800 leading-none">{start.toLocaleDateString('he-IL')}</div>
                                    </div>
                                    <div className="text-right">
                                        <div className="text-[9px] font-bold text-blue-400 uppercase tracking-wide mb-0.5">סוף</div>
                                        <div className="text-[15px] font-black text-slate-800 leading-none">{end?.toLocaleDateString('he-IL') || '—'}</div>
                                    </div>
                                </div>
                                <div className="h-2 bg-white/70 rounded-full overflow-hidden mb-2 shadow-inner">
                                    <div className="h-full bg-gradient-to-r from-blue-400 to-indigo-500 rounded-full transition-all duration-500"
                                        style={{width:`${progress}%`}} />
                                </div>
                                <div className="flex items-center justify-between">
                                    <span className="text-[15px] font-black text-indigo-600">
                                        {daysRemaining > 0 ? `${daysRemaining} ימים נשארו` : end ? '✓ הסתיים' : 'לחץ לעריכה'}
                                    </span>
                                    <span className="text-[11px] font-bold text-slate-400">{Math.round(progress)}%</span>
                                </div>
                            </div>
                        </div>
                    );
                })()}
                <div className="w-full max-w-[16rem] mx-auto px-2 mt-6">
                    <div className="flex justify-between text-[11px] font-black text-slate-400 mb-1.5 px-1">
                        <span>{Math.round(completedCount/exerciseGroups.length*100)}%</span>
                        <span>בוצעו {completedCount} / {exerciseGroups.length}</span>
                    </div>
                    <div className="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden" dir="ltr">
                        <div className="bg-emerald-500 h-2.5 rounded-full transition-all duration-700" style={{width:`${completedCount/exerciseGroups.length*100}%`}} />
                    </div>
                </div>
            </header>

            <main className="p-4 space-y-3 flex-1 overflow-y-auto no-scrollbar pb-36">
                {sortedGroups.map((group,idx)=>{
                    const isDone = isGroupDone(group);
                    const isNext = idx===nextIncompleteIndex;
                    return (
                        <div id={`ex-btn-${idx}`} key={group.id} className="flex items-center gap-2">
                            <div className="flex flex-col gap-1 shrink-0">
                                <button onClick={()=>handleMoveGroup(idx,-1)} disabled={idx===0}
                                    className="w-7 h-7 bg-slate-100 rounded-xl flex items-center justify-center text-slate-400 active:bg-slate-200 disabled:opacity-20">
                                    <Icon name="ChevronUp" size={14} />
                                </button>
                                <button onClick={()=>handleMoveGroup(idx,1)} disabled={idx===sortedGroups.length-1}
                                    className="w-7 h-7 bg-slate-100 rounded-xl flex items-center justify-center text-slate-400 active:bg-slate-200 disabled:opacity-20">
                                    <Icon name="ChevronDown" size={14} />
                                </button>
                            </div>
                            <button onClick={()=>handleOpenExercise(group)}
                                className={`flex-1 p-0.5 rounded-[1.6rem] transition-all active:scale-[0.98]
                                    ${isDone?'bg-emerald-50 shadow-sm opacity-80':isNext?'bg-slate-900 shadow-lg scale-[1.02]':'bg-white border border-slate-100 shadow-sm'}`}>
                                <div className={`flex items-center justify-between p-4 rounded-[1.4rem] ${isDone?'bg-slate-50':'bg-white'}`}>
                                    <div className="flex items-start gap-4">
                                        <div className={`w-12 h-12 bg-gradient-to-br ${group.color} text-white rounded-xl flex items-center justify-center text-2xl shadow-inner shrink-0 ${isDone?'opacity-50 grayscale':''}`}>{group.icon}</div>
                                        <div className="flex flex-col justify-center" style={{minHeight:'3rem'}}>
                                            <div className={`font-black text-[15px] leading-tight ${isDone?'text-slate-500 line-through':'text-slate-800'}`}>{group.title}</div>
                                            <div className={`inline-block self-start px-2.5 py-1 mt-1.5 rounded-md text-[12px] font-black ${isDone?'bg-slate-200 text-slate-400':group.badgeColor}`}>{group.category}</div>
                                        </div>
                                    </div>
                                    {isDone
                                        ? <div className="w-9 h-9 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-600"><Icon name="CheckCircle2" size={20} /></div>
                                        : <div className="w-9 h-9 bg-slate-50 rounded-full flex items-center justify-center text-slate-300"><Icon name="ChevronLeft" size={20} /></div>}
                                </div>
                            </button>
                        </div>
                    );
                })}
            </main>

            <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 backdrop-blur-md border-t border-slate-100 px-8 pt-4 flex justify-around items-center z-50 rounded-t-3xl shadow-xl" style={{paddingBottom:'calc(1rem + env(safe-area-inset-bottom))'}}>
                <button onClick={()=>setView('history')} className="flex flex-col items-center gap-1 text-slate-400 active:text-blue-600">
                    <Icon name="History" size={24} /><span className="text-[11px] font-black">היסטוריה</span>
                </button>
                <button onClick={()=>requestConfirm('להתחיל אימון חדש?',startNewWorkout)}
                    className="flex flex-col items-center gap-1 text-blue-600 -mt-14 bg-white p-3 rounded-full shadow-2xl border-4 border-slate-50 active:scale-90">
                    <div className="w-14 h-14 bg-blue-600 text-white rounded-full flex items-center justify-center shadow-2xl"><Icon name="Plus" size={36} /></div>
                    <span className="text-[11px] font-black mt-1">אימון חדש</span>
                </button>
                <button onClick={()=>setView('manage')} className="flex flex-col items-center gap-1 text-slate-400 active:text-blue-600">
                    <Icon name="Settings" size={24} /><span className="text-[11px] font-black">ניהול</span>
                </button>
            </nav>
        </div>
        </>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
