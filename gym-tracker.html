// ─── Roller ────────────────────────────────────────────────
const Roller = memo(({ value, onChange, min, max, step=1, label, isChanged }) => {
    const options = useMemo(() => {
        const o = [];
        for (let i = min; i <= max; i += step) o.push(i);
        return o;
    }, [min, max, step]);
    return (
        <div className="flex flex-col items-center flex-1">
            <span className="text-[8px] font-black text-slate-400 mb-1 uppercase tracking-tighter">{label}</span>
            <select value={value} onChange={e => onChange(parseFloat(e.target.value))}
                className={`w-full p-2.5 rounded-xl border-none text-center font-black text-base appearance-none outline-none transition-all
                    ${isChanged ? 'text-blue-600 ring-2 ring-blue-100 bg-blue-50' : 'bg-slate-100/60 text-slate-400 font-normal'}`}>
                {options.map(o => <option key={o} value={o}>{o}</option>)}
            </select>
        </div>
    );
});

// ─── ExerciseEntryRow ──────────────────────────────────────
// תיקון 1: bg-emerald-500 (היה bg-emerald-50 — טקסט לא נראה)
// תיקון 2: try/finally — isSaving לא נתקע בשגיאה
function ExerciseEntryRow({ ex, logs, sessionStartTime, onSave, onFinish, isLast, isSuperset }) {
    // תיקון: דגל נפרד לכל שדה — wC=ק"ג שונה, rC=חזרות שונה
    const [s1, setS1] = useState({ w:10, r:10, wC:false, rC:false });
    const [s2, setS2] = useState({ w:10, r:10, wC:false, rC:false });
    const [isSaving, setIsSaving] = useState(false);

    useEffect(() => {
        setS1(p=>({...p,wC:false,rC:false}));
        setS2(p=>({...p,wC:false,rC:false}));
    }, [sessionStartTime]);

    const done = useMemo(() => ({
        s1: logs.some(l => l.exId===ex.id && l.setNum===1 && new Date(l.timestamp).getTime()>sessionStartTime),
        s2: logs.some(l => l.exId===ex.id && l.setNum===2 && new Date(l.timestamp).getTime()>sessionStartTime)
    }), [logs, ex.id, sessionStartTime]);

    const handleSetSave = async (num, state) => {
        setIsSaving(true);
        try {
            await onSave(ex.id, num, state.w, state.r, isSuperset);
            if (num===2 && isLast) setTimeout(onFinish, 800);
        } finally {
            setIsSaving(false);
        }
    };

    return (
        <div className="space-y-3" dir="rtl">
            {[1,2].map(num => {
                const state    = num===1 ? s1 : s2;
                const setState = num===1 ? setS1 : setS2;
                const isDone   = num===1 ? done.s1 : done.s2;
                return (
                    <div key={num} className="bg-white p-3.5 rounded-[1.8rem] border border-slate-100 shadow-sm flex items-center gap-3">
                        <div className="w-12 h-12 bg-slate-900 text-white rounded-2xl flex flex-col items-center justify-center shrink-0 shadow-lg">
                            <span className="text-[7px] font-black uppercase tracking-tighter opacity-60">SET</span>
                            <span className="text-lg font-black leading-none">{num}</span>
                        </div>
                        <div className="flex flex-1 gap-2.5">
                            <Roller label="ק״ג"   min={0} max={250} step={0.5} value={state.w} isChanged={state.wC} onChange={v=>setState(p=>({...p,w:v,wC:true}))} />
                            <Roller label="חזרות" min={1} max={50}            value={state.r} isChanged={state.rC} onChange={v=>setState(p=>({...p,r:v,rC:true}))} />
                        </div>
                        <button onClick={() => handleSetSave(num, state)} disabled={isDone||isSaving}
                            className={`px-6 h-11 rounded-2xl flex items-center justify-center font-black text-sm transition-all shrink-0 shadow-lg active:scale-95
                                ${isDone ? 'bg-slate-100 text-slate-300 shadow-none' : 'bg-emerald-500 text-white shadow-emerald-200'}`}>
                            {isDone ? 'בוצע' : isSaving ? '...' : 'סיום'}
                        </button>
                    </div>
                );
            })}
        </div>
    );
}

                                {ex.tips.map((t,i)=>(
                                    <div key={i} className="bg-white p-2.5 rounded-xl border border-slate-100 text-[11px] text-slate-600 flex items-start gap-2 shadow-sm">
                                        <Icon name="CheckCircle2" size={14} className="text-emerald-500 mt-0.5 shrink-0" /><span className="font-bold">{t}</span>
                                    </div>
                                ))}
                            </div>
                            <textarea defaultValue={notes?.[ex.id]||''} onBlur={e=>onSaveNote(ex.id,e.target.value)}
                                placeholder="הוסף דגשים והערות אישיות..."
                                className="w-full bg-amber-50/60 border border-amber-200/60 rounded-xl p-3 text-[13px] font-bold text-slate-700 outline-none focus:ring-2 focus:ring-amber-400 min-h-[60px] resize-none" />
                        </section>
                        <section className="flex gap-2 mb-5 overflow-x-auto no-scrollbar py-1">
                            {exHistory.map((h,i)=>(
                                <div key={i} className={`p-2.5 rounded-2xl border shrink-0 text-[10px] ${i<2?'bg-indigo-50/80 border-indigo-200 shadow-sm':'bg-slate-50/50 border-slate-100 opacity-70'}`}>
                                    <span className={`font-bold block mb-1 ${i<2?'text-indigo-500':'text-slate-400'}`}>{new Date(h.timestamp).toLocaleDateString('he-IL')}</span>
                                    <span className={`font-black ${i<2?'text-indigo-900':'text-slate-600'}`}>סט {h.setNum}: {h.weight}kg × {h.reps}</span>
                                </div>
                            ))}
                        </section>
                        <ExerciseEntryRow ex={ex} logs={logs} sessionStartTime={sessionStartTime}
                            onSave={onSave} isLast={exIdx===group.exercises.length-1} onFinish={onBack} isSuperset={group.isSuperset} />
                    </div>
                );
            })}
        </div>
        {restTimer>0 && (
            <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[200]">
                <div className="bg-blue-600 text-white px-8 py-3 rounded-full shadow-2xl flex items-center gap-3 border-2 border-white animate-pulse">
                    <Icon name="Clock" size={20} />
                    <span className="font-black text-lg font-mono">מנוחה: {restTimer}</span>
                </div>
            </div>
        )}
    </div>
));

// ─── HistoryView ───────────────────────────────────────────
// תיקון 3: [...items].sort — לא מוטייט מערך מקורי
const HistoryView = ({ logs, onBack, onDeleteDate, onDeleteOne, requestConfirm }) => {
    const [expandedDate, setExpandedDate] = useState(null);
    const grouped = useMemo(() => {
        const g = {};
        logs.forEach(l => {
            const d = new Date(l.timestamp).toLocaleDateString('he-IL');
            if (!g[d]) g[d] = [];
            g[d].push(l);
        });
        return Object.entries(g).sort((a,b)=>new Date(b[1][0].timestamp)-new Date(a[1][0].timestamp));
    }, [logs]);

    return (
        <div className="flex flex-col h-screen bg-white overflow-hidden fade-in" dir="rtl">
            <div className="bg-slate-900 p-5 pt-6 rounded-b-[2.5rem] shadow-xl relative shrink-0">
                <button onClick={onBack} className="absolute top-4 left-6 p-2.5 bg-white/20 rounded-full text-white active:scale-90 shadow-lg"><Icon name="Home" size={22} /></button>
                <h2 className="text-xl font-black text-white text-center">היסטוריה</h2>
            </div>
            <div className="flex-1 overflow-y-auto p-4 space-y-3 no-scrollbar pb-32">
                {grouped.length===0 ? (
                    <div className="flex flex-col items-center justify-center h-[50vh] text-slate-400">
                        <Icon name="Dumbbell" size={64} className="mb-4 text-slate-300" />
                        <p className="font-black text-xl">אין היסטוריה עדיין</p>
                    </div>
                ) : grouped.map(([date,items])=>(
                    <div key={date} className="bg-slate-50 rounded-[2.2rem] border border-slate-100 shadow-sm overflow-hidden">
                        <div className="flex justify-between items-center bg-white p-1">
                            <button onClick={()=>setExpandedDate(expandedDate===date?null:date)} className="flex-1 flex justify-between items-center p-4">
                                <div className="flex items-center gap-4">
                                    <div className="w-3 h-3 rounded-full bg-blue-500" />
                                    <span className="font-black text-slate-800">{date}</span>
                                </div>
                                <Icon name="ChevronDown" size={20} className={`text-slate-400 transition-transform duration-300 ${expandedDate===date?'rotate-180':''}`} />
                            </button>
                            <button onClick={()=>requestConfirm('למחוק את כל יום האימון?',()=>onDeleteDate(items))} className="p-4 text-red-300 active:text-red-500">
                                <Icon name="Trash" size={20} />
                            </button>
                        </div>
                        {expandedDate===date && (
                            <div className="p-4 bg-white border-t border-slate-100 space-y-3">
                                {[...items].sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp)).map(it => {
                                    const ex = exerciseGroups.flatMap(g=>g.exercises).find(e=>e.id===it.exId);
                                    return (
                                        <div key={it.id} className="flex justify-between items-center text-xs border-b border-slate-50 last:border-0 pb-3">
                                            <div className="flex items-center gap-2">
                                                <button onClick={()=>requestConfirm('למחוק סט זה?',()=>onDeleteOne(it.id))} className="text-red-200 hover:text-red-500">
                                                    <Icon name="Trash2" size={12} />
                                                </button>
                                                <span className="font-black text-slate-700">{ex?.title||'תרגיל'}</span>
                                            </div>
                                            <span className="text-blue-600 font-black bg-blue-50 px-2.5 py-1 rounded-xl">סט {it.setNum}: {it.weight}kg × {it.reps}</span>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </div>
                ))}
            </div>
        </div>
    );
};

// ─── ManageView ────────────────────────────────────────────
// תיקון 4: onUpdateSettings קריאה אחת עם '_bulk'
const ManageView = ({ logs, notes, settings, onBack, onUpdateSettings, requestConfirm, showToast, user, onLogout }) => {
    const handleBackup = () => {
        const blob = new Blob([JSON.stringify({logs,notes,settings})], {type:'application/json'});
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href = url;
        a.download = `gym-backup-${new Date().toLocaleDateString('he-IL').replace(/\./g,'-')}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('הגיבוי הורד בהצלחה');
    };

    const handleRestore = e => {
        const file = e.target.files[0];
        if (!file) return;
        requestConfirm('שחזור ימחוק את כל הנתונים הקיימים. להמשיך?', () => {
            const reader = new FileReader();
            reader.onload = async ev => {
                try {
                    const data = JSON.parse(ev.target.result);
                    if (!data.logs) throw new Error();
                    showToast('משחזר נתונים...');
                    const base = db.collection('artifacts').doc(APP_ID).collection('users').doc(user.uid);
                    for (const log of logs) await base.collection('logs').doc(log.id).delete();
                    for (const log of data.logs) {
                        const {id,...logData} = log;
                        await base.collection('logs').doc(id||crypto.randomUUID()).set(logData);
                    }
                    if (data.notes) for (const [exId,text] of Object.entries(data.notes))
                        await base.collection('notes').doc(exId).set({text});
                    if (data.settings) {
                        await base.set({settings:data.settings},{merge:true});
                        onUpdateSettings('_bulk', data.settings);  // קריאה אחת בלבד
                    }
                    showToast('הנתונים שוחזרו בהצלחה');
                } catch { showToast('שגיאה בשחזור', true); }
            };
            reader.readAsText(file);
        }, () => { e.target.value = null; });
    };

    return (
        <div className="flex flex-col h-screen bg-slate-50 overflow-hidden fade-in" dir="rtl">
            <div className="bg-slate-900 p-5 pt-6 rounded-b-[2.5rem] shadow-xl relative shrink-0">
                <button onClick={onBack} className="absolute top-4 left-6 p-2.5 bg-white/20 rounded-full text-white active:scale-90 shadow-lg"><Icon name="Home" size={22} /></button>
                <h2 className="text-xl font-black text-white text-center">ניהול והגדרות</h2>
            </div>
            <div className="flex-1 overflow-y-auto p-4 space-y-6 no-scrollbar pb-32">
                <section className="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100">
                    <h3 className="text-lg font-black text-slate-800 mb-4 flex items-center gap-2"><Icon name="Database" size={20} className="text-blue-500" /> גיבוי ושחזור</h3>
                    <div className="space-y-4">
                        <button onClick={handleBackup} className="w-full flex items-center gap-3 bg-blue-50 p-4 rounded-2xl border border-blue-100 text-blue-700 active:scale-[0.98]">
                            <div className="bg-blue-100 p-2 rounded-xl"><Icon name="Download" size={20} /></div>
                            <div><div className="font-black text-sm">גיבוי נתונים</div><div className="text-[10px] font-bold opacity-70">הורדת קובץ למכשיר</div></div>
                        </button>
                        <label className="w-full flex items-center gap-3 bg-indigo-50 p-4 rounded-2xl border border-indigo-100 text-indigo-700 cursor-pointer active:scale-[0.98]">
                            <div className="bg-indigo-100 p-2 rounded-xl"><Icon name="Upload" size={20} /></div>
                            <div><div className="font-black text-sm">שחזור נתונים</div><div className="text-[10px] font-bold opacity-70">העלאת קובץ גיבוי</div></div>
                            <input type="file" accept=".json" className="hidden" onChange={handleRestore} />
                        </label>
                    </div>
                </section>
                <section className="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100">
                    <h3 className="text-lg font-black text-slate-800 mb-4 flex items-center gap-2"><Icon name="Settings" size={20} className="text-rose-500" /> הגדרות אימון</h3>
                    <div className="space-y-4">
                        {[
                            {label:'מנוחה לסט רגיל',  key:'normalRest',   opts:[60,90,120]},
                            {label:'מנוחה לסופר-סט',  key:'supersetRest', opts:[30,45,60]}
                        ].map(({label,key,opts})=>(
                            <div key={key} className="flex justify-between items-center bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                <span className="font-bold text-sm text-slate-700">{label}</span>
                                <select className="bg-white border border-slate-200 rounded-xl px-3 py-1 font-black text-rose-600 outline-none"
                                    value={settings[key]} onChange={e=>onUpdateSettings(key,Number(e.target.value))}>
                                    {opts.map(o=><option key={o} value={o}>{o} שניות</option>)}
                                </select>
                            </div>
                        ))}
                    </div>
                </section>
            </div>
        </div>
    );
};


// ─── App ───────────────────────────────────────────────────
function App() {
    const [user,             setUser]             = useState(null);
    const [authReady,        setAuthReady]        = useState(false);
    const [view,             setView]             = useState('list');
    const [activeGroup,      setActiveGroup]      = useState(null);
    const [logs,             setLogs]             = useState([]);
    const [workoutSec,       setWorkoutSec]       = useState(0);
    const [isWorkoutActive,  setIsWorkoutActive]  = useState(false);
    const [restTimer,        setRestTimer]        = useState(0);
    const [sessionStartTime, setSessionStartTime] = useState(()=>Date.now());
    const [confirmAction,    setConfirmAction]    = useState(null);
    const [toast,            setToast]            = useState(null);
    const [notes,            setNotes]            = useState({});
    const [images,           setImages]           = useState({});
    const [videos,           setVideos]           = useState({});
    const [settings,         setSettings]         = useState({normalRest:90,supersetRest:30});

    const requestConfirm = useCallback((text,onConfirm,onCancel)=>setConfirmAction({text,onConfirm,onCancel}),[]);
    const showToast      = useCallback((msg,isError=false)=>{ setToast({msg,isError}); setTimeout(()=>setToast(null),2500); },[]);

    // התחברות אנונימית אוטומטית
    useEffect(()=>{
        const unsub = auth.onAuthStateChanged(u=>{
            if (u) { setUser(u); setAuthReady(true); }
            else   { auth.signInAnonymously(); }
        });
        return unsub;
    },[]);

    // Firestore sync
    useEffect(()=>{
        if (!user) return;
        const base = db.collection('artifacts').doc(APP_ID).collection('users').doc(user.uid);
        const u1 = base.collection('logs').onSnapshot(snap=>setLogs(snap.docs.map(d=>({id:d.id,...d.data()}))));
        const u2 = base.collection('notes').onSnapshot(snap=>{ const n={}; snap.forEach(d=>n[d.id]=d.data().text); setNotes(n); });
        const u3 = base.onSnapshot(doc=>{ if(doc.exists&&doc.data().settings) setSettings(doc.data().settings); });
        const u4 = base.collection('images').onSnapshot(snap=>{ const m={}; snap.forEach(d=>m[d.id]=d.data().url); setImages(m); });
        const u5 = base.collection('videos').onSnapshot(snap=>{ const m={}; snap.forEach(d=>m[d.id]=d.data().url); setVideos(m); });
        return ()=>{ u1(); u2(); u3(); u4(); u5(); };
    },[user]);

    // Timers
    useEffect(()=>{
        if (!isWorkoutActive) return;
        const t = setInterval(()=>setWorkoutSec(s=>s+1),1000);
        return ()=>clearInterval(t);
    },[isWorkoutActive]);

    useEffect(()=>{
        if (restTimer<=0) return;
        const t = setInterval(()=>setRestTimer(s=>s-1),1000);
        return ()=>clearInterval(t);
    },[restTimer]);

    const base = () => db.collection('artifacts').doc(APP_ID).collection('users').doc(user.uid);

    const handleUpdateSettings = async (key,value) => {
        const newSettings = key==='_bulk' ? value : {...settings,[key]:value};
        setSettings(newSettings);
        await base().set({settings:newSettings},{merge:true});
    };

    const handleSaveSet = async (exId,setNum,weight,reps,isSuperset)=>{
        try {
            await base().collection('logs').add({exId,setNum,weight,reps,timestamp:new Date().toISOString()});
            setRestTimer(isSuperset ? settings.supersetRest : settings.normalRest);
        } catch(e) { showToast('שגיאה בשמירה: '+e.message,true); }
    };

    const handleSaveNote = async (exId,text)=>{
        await base().collection('notes').doc(exId).set({text});
    };

    const handleSaveVideo = async (exId, url) => {
        if (!user || !url.trim()) return;
        const match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([A-Za-z0-9_-]{11})/);
        const videoId = match ? match[1] : null;
        if (!videoId) { showToast('קישור YouTube לא תקין', true); return; }
        await base().collection('videos').doc(exId).set({ url: videoId });
        showToast('הסרטון נשמר');
    };

    const handleDeleteVideo = async (exId) => {
        await base().collection('videos').doc(exId).delete();
        showToast('הסרטון הוסר');
    };

    const handleSaveImage = (exId, file) => {
        if (!user || !file) return;
        showToast('מעלה תמונה...');
        const canvas = document.createElement('canvas');
        const ctx    = canvas.getContext('2d');
        const img    = new Image();
        const reader = new FileReader();
        reader.onload = ev => {
            img.onload = async () => {
                // כיווץ ל-600px מקסימום — ~50-80KB
                const MAX = 600;
                const ratio = Math.min(MAX / img.width, MAX / img.height, 1);
                canvas.width  = Math.round(img.width  * ratio);
                canvas.height = Math.round(img.height * ratio);
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                const url = canvas.toDataURL('image/jpeg', 0.75);
                try {
                    await base().collection('images').doc(exId).set({ url });
                    showToast('התמונה נשמרה');
                } catch(e) { showToast('שגיאה בשמירת תמונה', true); }
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    };

    const startNewWorkout = ()=>{
        setWorkoutSec(0); setIsWorkoutActive(false); setRestTimer(0);
        setSessionStartTime(Date.now()); setView('list'); setActiveGroup(null);
    };

    const handleDeleteLog  = async id=>{
        await base().collection('logs').doc(id).delete();
        showToast('הרשומה נמחקה');
    };
    const handleDeleteDate = async items=>{
        for (const item of items) await base().collection('logs').doc(item.id).delete();
        showToast('יום האימון נמחק');
    };

    const completedCount = useMemo(()=>
        exerciseGroups.filter(g=>{ const ids=g.exercises.map(e=>e.id); return logs.some(l=>ids.includes(l.exId)&&new Date(l.timestamp).getTime()>sessionStartTime); }).length
    ,[logs,sessionStartTime]);

    const nextIncompleteIndex = useMemo(()=>
        exerciseGroups.findIndex(g=>{ const ids=g.exercises.map(e=>e.id); return !logs.some(l=>ids.includes(l.exId)&&new Date(l.timestamp).getTime()>sessionStartTime); })
    ,[logs,sessionStartTime]);

    useEffect(()=>{
        if (view!=='list') return;
        setTimeout(()=>{
            const idx = nextIncompleteIndex>0 ? nextIncompleteIndex-1 : 0;
            document.getElementById(`ex-btn-${idx}`)?.scrollIntoView({behavior:'smooth',block:'center'});
        },250);
    },[view,nextIncompleteIndex]);

    const handleOpenExercise = group=>{
        if (workoutSec===0&&!isWorkoutActive) {
            requestConfirm('להפעיל טיימר?',
                ()=>{ setIsWorkoutActive(true); setActiveGroup(group); setView('detail'); },
                ()=>{                           setActiveGroup(group); setView('detail'); }
            );
        } else { setActiveGroup(group); setView('detail'); }
    };

    // Overlays — תמיד מעל
    const overlays = (
        <>
            {confirmAction && (
                <div className="fixed inset-0 z-[999] bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4" dir="rtl">
                    <div className="bg-white rounded-3xl p-6 w-full max-w-xs shadow-2xl">
                        <h3 className="text-lg font-black text-slate-800 mb-5 text-center">{confirmAction.text}</h3>
                        <div className="flex gap-3">
                            <button onClick={()=>{ confirmAction.onCancel?.(); setConfirmAction(null); }} className="flex-1 p-3 rounded-xl font-bold text-slate-500 bg-slate-100 active:scale-95">ביטול</button>
                            <button onClick={()=>{ confirmAction.onConfirm(); setConfirmAction(null); }} className="flex-1 p-3 rounded-xl font-bold text-white bg-blue-600 active:scale-95">אישור</button>
                        </div>
                    </div>
                </div>
            )}
            {/* תיקון 5: AlertCircle לשגיאה, CheckCircle2 להצלחה */}
            {toast && (
                <div className="fixed bottom-24 left-1/2 -translate-x-1/2 z-[1000] w-[90%] max-w-[300px]">
                    <div className={`px-5 py-3 rounded-2xl shadow-2xl font-black text-sm flex items-center justify-center gap-2 ${toast.isError?'bg-rose-500':'bg-emerald-500'} text-white`}>
                        <Icon name={toast.isError?'AlertCircle':'CheckCircle2'} size={20} /> {toast.msg}
                    </div>
                </div>
            )}
        </>
    );

    if (!authReady) return <div className="h-screen flex items-center justify-center bg-slate-50"><div className="text-slate-400 text-xl font-black">טוען...</div></div>;

    if (view==='detail'&&activeGroup) return <>{overlays}<DetailView group={activeGroup} logs={logs} restTimer={restTimer} sessionStartTime={sessionStartTime} notes={notes} onSaveNote={handleSaveNote} images={images} onSaveImage={handleSaveImage} videos={videos} onSaveVideo={handleSaveVideo} onDeleteVideo={handleDeleteVideo} onBack={()=>{setView('list');setActiveGroup(null);}} onSave={handleSaveSet} /></>;
    if (view==='history') return <>{overlays}<HistoryView logs={logs} onBack={()=>setView('list')} onDeleteDate={handleDeleteDate} onDeleteOne={handleDeleteLog} requestConfirm={requestConfirm} /></>;
    if (view==='manage')  return <>{overlays}<ManageView  logs={logs} notes={notes} settings={settings} onUpdateSettings={handleUpdateSettings} onBack={()=>setView('list')} requestConfirm={requestConfirm} showToast={showToast} user={user} /></>;

    // List view
    return (
        <>
        {overlays}
        <div className="max-w-md mx-auto h-screen bg-slate-50 flex flex-col overflow-hidden shadow-2xl relative" dir="rtl">
            <header className="bg-white pb-6 rounded-b-[2.5rem] shadow-sm sticky top-0 z-10 border-b border-slate-100 shrink-0">
                <div className="bg-black w-full py-5 mb-8 shadow-2xl">
                    <h1 className="text-2xl font-black text-white tracking-widest text-center uppercase">אימון פול-באדי</h1>
                </div>
                <div className="flex items-center justify-center px-6 relative h-32">
                    <button onClick={()=>setIsWorkoutActive(v=>!v)}
                        className={`flex flex-col items-center justify-center w-28 h-28 rounded-full shadow-xl border-[5px] transition-all active:scale-95 outline-none
                            ${isWorkoutActive?'bg-emerald-50 border-emerald-500 timer-active':'bg-white border-red-500'}`}>
                        <Icon name="Timer" size={26} className={isWorkoutActive?'animate-pulse mb-0.5 text-emerald-600':'mb-0.5 text-red-500 opacity-80'} />
                        <span className="font-mono text-2xl font-black tracking-widest" dir="ltr">
                            {`${String(Math.floor(workoutSec/60)).padStart(2,'0')}:${String(workoutSec%60).padStart(2,'0')}`}
                        </span>
                    </button>
                    <div className="absolute left-8">
                        <button onClick={()=>requestConfirm('לאפס סטופר?',()=>setWorkoutSec(0))}
                            className="p-3.5 bg-slate-100 text-slate-600 rounded-full shadow-md active:rotate-180 transition-transform">
                            <Icon name="RotateCcw" size={22} />
                        </button>
                    </div>
                </div>
                <div className="w-full max-w-[16rem] mx-auto px-2 mt-6">
                    <div className="flex justify-between text-[11px] font-black text-slate-400 mb-1.5 px-1">
                        <span>{Math.round(completedCount/exerciseGroups.length*100)}%</span>
                        <span>בוצעו {completedCount} / {exerciseGroups.length}</span>
                    </div>
                    <div className="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden" dir="ltr">
                        <div className="bg-emerald-500 h-2.5 rounded-full transition-all duration-700" style={{width:`${completedCount/exerciseGroups.length*100}%`}} />
                    </div>
                </div>
            </header>

            <main className="p-4 space-y-3 flex-1 overflow-y-auto no-scrollbar pb-36">
                {exerciseGroups.map((group,idx)=>{
                    const ids    = group.exercises.map(e=>e.id);
                    const isDone = logs.some(l=>ids.includes(l.exId)&&new Date(l.timestamp).getTime()>sessionStartTime);
                    const isNext = idx===nextIncompleteIndex;
                    return (
                        <button id={`ex-btn-${idx}`} key={group.id} onClick={()=>handleOpenExercise(group)}
                            className={`w-full p-0.5 rounded-[1.6rem] transition-all active:scale-[0.98]
                                ${isDone?'bg-emerald-50 shadow-sm opacity-80':isNext?'bg-slate-900 shadow-lg scale-[1.02]':'bg-white border border-slate-100 shadow-sm'}`}>
                            <div className={`flex items-center justify-between p-4 rounded-[1.4rem] ${isDone?'bg-slate-50':'bg-white'}`}>
                                <div className="flex items-center gap-4">
                                    <div className={`w-12 h-12 bg-gradient-to-br ${group.color} text-white rounded-xl flex items-center justify-center text-2xl shadow-inner ${isDone?'opacity-50 grayscale':''}`}>{group.icon}</div>
                                    <div>
                                        <div className={`font-black text-[15px] leading-tight ${isDone?'text-slate-500 line-through':'text-slate-800'}`}>{group.title}</div>
                                        <div className={`inline-block px-2.5 py-1 mt-1.5 rounded-md text-[12px] font-black ${isDone?'bg-slate-200 text-slate-400':group.badgeColor}`}>{group.category}</div>
                                    </div>
                                </div>
                                {isDone
                                    ? <div className="w-9 h-9 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-600"><Icon name="CheckCircle2" size={20} /></div>
                                    : <div className="w-9 h-9 bg-slate-50 rounded-full flex items-center justify-center text-slate-300"><Icon name="ChevronLeft" size={20} /></div>}
                            </div>
                        </button>
                    );
                })}
            </main>

            <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 backdrop-blur-md border-t border-slate-100 px-8 pt-4 flex justify-around items-center z-50 rounded-t-3xl shadow-xl" style={{paddingBottom:'calc(1rem + env(safe-area-inset-bottom))'}}>
                <button onClick={()=>setView('history')} className="flex flex-col items-center gap-1 text-slate-400 active:text-blue-600">
                    <Icon name="History" size={24} /><span className="text-[11px] font-black">היסטוריה</span>
                </button>
                <button onClick={()=>requestConfirm('להתחיל אימון חדש?',startNewWorkout)}
                    className="flex flex-col items-center gap-1 text-blue-600 -mt-14 bg-white p-3 rounded-full shadow-2xl border-4 border-slate-50 active:scale-90">
                    <div className="w-14 h-14 bg-blue-600 text-white rounded-full flex items-center justify-center shadow-2xl"><Icon name="Plus" size={36} /></div>
                    <span className="text-[11px] font-black mt-1">אימון חדש</span>
                </button>
                <button onClick={()=>setView('manage')} className="flex flex-col items-center gap-1 text-slate-400 active:text-blue-600">
                    <Icon name="Settings" size={24} /><span className="text-[11px] font-black">ניהול</span>
                </button>
            </nav>
        </div>
        </>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
