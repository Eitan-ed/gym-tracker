                            {musicList.length > 1 && (
                                <button onClick={()=>setMusicIndex(i=>(i+1)%musicList.length)}
                                    className="px-2 py-1.5 rounded-xl text-[11px] font-black bg-slate-700 text-slate-300 active:scale-95 shrink-0">⏭</button>
                            )}
                            <label className="flex-1 flex items-center justify-center gap-1 bg-purple-800/60 text-purple-200 rounded-xl py-1.5 text-[11px] font-black cursor-pointer active:scale-95">
                                <Icon name="Upload" size={12}/> הוסף
                                <input type="file" accept=".mp3,.m4a,.aac,.ogg,.wav,.flac" multiple className="hidden"
                                    onChange={e=>handleMusicUpload(e.target.files)} />
                            </label>
                            <a href="https://open.spotify.com" target="_blank" rel="noopener noreferrer"
                                className="shrink-0 w-8 h-8 flex items-center justify-center rounded-full active:scale-90" style={{background:'#1DB954'}}>
                                <svg viewBox="0 0 24 24" width="18" height="18"><circle cx="12" cy="12" r="12" fill="#1DB954"/><path fill="white" d="M17.9 10.9C14.7 9 9.35 8.8 6.3 9.75c-.5.15-1-.15-1.15-.6-.15-.5.15-1 .6-1.15 3.55-1.05 9.4-.85 13.1 1.35.45.25.6.85.35 1.3-.25.35-.85.5-1.3.25zm-.1 2.8c-.25.35-.7.5-1.05.25-2.7-1.65-6.8-2.15-9.95-1.15-.4.1-.85-.1-.95-.5-.1-.4.1-.85.5-.95 3.65-1.1 8.15-.55 11.25 1.35.3.15.45.65.2 1zm-1.2 2.75c-.2.3-.55.4-.85.2-2.35-1.45-5.3-1.75-8.8-.95-.3.1-.65-.15-.75-.45-.1-.3.15-.65.45-.75 3.8-.85 7.1-.5 9.7 1.1.35.15.4.55.25.85z"/></svg>
                            </a>
                            <a href="https://www.youtube.com" target="_blank" rel="noopener noreferrer"
                                className="shrink-0 w-8 h-8 flex items-center justify-center rounded-xl active:scale-90" style={{background:'#FF0000'}}>
                                <svg viewBox="0 0 24 24" width="18" height="18"><path fill="white" d="M19.6 7.2a2.5 2.5 0 0 0-1.76-1.77C16.25 5 12 5 12 5s-4.25 0-5.84.43A2.5 2.5 0 0 0 4.4 7.2 26 26 0 0 0 4 12a26 26 0 0 0 .4 4.8 2.5 2.5 0 0 0 1.76 1.77C7.75 19 12 19 12 19s4.25 0 5.84-.43a2.5 2.5 0 0 0 1.76-1.77A26 26 0 0 0 20 12a26 26 0 0 0-.4-4.8z"/><path fill="#FF0000" d="M10 15l5.2-3L10 9v6z"/></svg>
                            </a>
                            <button onClick={()=>{ window.open('https://music.youtube.com','_blank'); }}
                                className="shrink-0 w-8 h-8 flex items-center justify-center rounded-xl active:scale-90" style={{background:'#1a1a2e'}}>
                                <svg viewBox="0 0 24 24" width="18" height="18"><path fill="white" d="M12 3a9 9 0 1 0 0 18A9 9 0 0 0 12 3zm0 2a7 7 0 1 1 0 14A7 7 0 0 1 12 5zm0 2a5 5 0 1 0 0 10A5 5 0 0 0 12 7zm0 2a3 3 0 1 1 0 6 3 3 0 0 1 0-6zm-3.5-1.5l1.8 4.2-4.2 1.8 1-4.8 1.4-1.2z"/></svg>
                            </button>
                            {musicList.length > 0 && (
                                <button onClick={handleMusicRemoveAll}
                                    className="shrink-0 px-2 py-1.5 bg-slate-700 text-slate-400 rounded-xl active:text-red-400 active:scale-95">
                                    <Icon name="Trash2" size={13}/>
                                </button>
                            )}
                        </div>
                    </div>
                )}
            </header>

            <main className="p-4 space-y-3 flex-1 overflow-y-auto no-scrollbar pb-36">
                {visibleGroups.map((group,idx)=>{
                    const isSkipped = skippedGroups.includes(group.id);
                    const isDone    = isGroupDone(group);
                    const isDoneReal = isDone && !isSkipped;
                    const isNext    = idx===nextIncompleteIndex;
                    return (
                        <div id={`ex-btn-${idx}`} key={group.id} className="flex items-center gap-2">
                            <div className="flex flex-col gap-1 shrink-0">
                                <button onClick={()=>handleMoveGroup(idx,-1)} disabled={idx===0}
                                    className="w-7 h-7 bg-slate-100 rounded-xl flex items-center justify-center text-slate-400 active:bg-slate-200 disabled:opacity-20">
                                    <Icon name="ChevronUp" size={14} />
                                </button>
                                <button onClick={()=>handleMoveGroup(idx,1)} disabled={idx===visibleGroups.length-1}
                                    className="w-7 h-7 bg-slate-100 rounded-xl flex items-center justify-center text-slate-400 active:bg-slate-200 disabled:opacity-20">
                                    <Icon name="ChevronDown" size={14} />
                                </button>
                            </div>
                            <div onClick={()=>handleOpenExercise(group)}
                                className={`flex-1 p-0.5 rounded-[1.6rem] transition-all active:scale-[0.98] cursor-pointer
                                    ${isDoneReal?'bg-emerald-50 shadow-sm opacity-80':isSkipped?'bg-orange-50 shadow-sm opacity-70':isNext?'bg-slate-900 shadow-lg scale-[1.02]':'bg-white border border-slate-100 shadow-sm'}`}>
                                <div className={`flex items-center justify-between p-4 rounded-[1.4rem] ${isDoneReal?'bg-slate-50':isSkipped?'bg-orange-50/40':'bg-white'}`}>
                                    <div className="flex items-start gap-4">
                                        <div className="flex flex-col items-center gap-0.5 shrink-0">
                                            <div className={`w-12 h-12 bg-gradient-to-br ${group.color} text-white rounded-xl flex items-center justify-center text-2xl shadow-inner ${isDone?'opacity-50 grayscale':''}`}>{group.icon}</div>
                                            <span className={`text-[10px] font-black ${isNext?'text-slate-300':isDone?'text-slate-400':'text-slate-400'}`}>{idx+1}/{visibleGroups.length}</span>
                                        </div>
                                        <div className="flex flex-col justify-center" style={{minHeight:'3rem'}}>
                                            <div className={`font-black text-[15px] leading-tight ${isDone?'text-slate-500 line-through':'text-slate-800'}`}>
                                            {group.title}
                                        </div>
                                            <div className="flex items-center gap-2 mt-1.5">
                                                <div className={`px-2.5 py-1 rounded-md text-[12px] font-black ${isDone?'bg-slate-200 text-slate-400':group.badgeColor}`}>{group.category}</div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-2 shrink-0">
                                        {!isDoneReal && (
                                            <button onClick={e=>{e.stopPropagation();handleSkipGroup(group.id)}}
                                                className={`text-[11px] font-bold px-2.5 py-1.5 rounded-xl active:scale-95 transition-all
                                                    ${isSkipped?'bg-orange-100 text-orange-500':'bg-slate-100 text-slate-400 active:text-slate-600'}`}>
                                                {isSkipped ? '↩ בטל' : 'דלג'}
                                            </button>
                                        )}
                                        {isDoneReal
                                            ? <div className="w-9 h-9 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-600"><Icon name="CheckCircle2" size={20} /></div>
                                            : isSkipped
                                            ? <div className="w-9 h-9 bg-orange-100 rounded-full flex items-center justify-center text-orange-400 font-black text-lg">–</div>
                                            : <div className="w-9 h-9 bg-slate-50 rounded-full flex items-center justify-center text-slate-300"><Icon name="ChevronLeft" size={20} /></div>}
                                    </div>
                                </div>
                            </div>
                        </div>
                    );
                })}
            </main>

            <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 backdrop-blur-md border-t border-slate-100 px-8 pt-4 flex justify-around items-center z-50 rounded-t-3xl shadow-xl" style={{paddingBottom:'calc(1rem + env(safe-area-inset-bottom))'}}>
                <button onClick={()=>setView('history')} className="flex flex-col items-center gap-1 text-slate-400 active:text-blue-600">
                    <Icon name="History" size={24} /><span className="text-[11px] font-black">היסטוריה</span>
                </button>
                <button onClick={()=>setShowNewWorkoutModal(true)}
                    className="flex flex-col items-center gap-1 text-blue-600 -mt-14 bg-white p-3 rounded-full shadow-2xl border-4 border-slate-50 active:scale-90">
                    <div className="w-14 h-14 bg-blue-600 text-white rounded-full flex items-center justify-center shadow-2xl"><Icon name="Plus" size={36} /></div>
                    <span className="text-[11px] font-black mt-1">אימון חדש</span>
                </button>
                <button onClick={()=>setView('manage')} className="flex flex-col items-center gap-1 text-slate-400 active:text-blue-600">
                    <Icon name="Settings" size={24} /><span className="text-[11px] font-black">ניהול</span>
                </button>
            </nav>
        </div>
        </>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
</script>
</body>
</html>
