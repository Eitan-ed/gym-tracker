// ─── IndexedDB helper (למוזיקה) ────────────────────────────
const IDB = (() => {
    let dbP = null;
    const open = () => {
        if (dbP) return dbP;
        dbP = new Promise((res, rej) => {
            const req = indexedDB.open('gym-tracker-db', 1);
            req.onupgradeneeded = e => e.target.result.createObjectStore('files');
            req.onsuccess = e => res(e.target.result);
            req.onerror   = () => { dbP = null; rej(); };
        });
        return dbP;
    };
    return {
        get: async (key) => {
            try {
                const db = await open();
                return new Promise(res => {
                    const req = db.transaction('files','readonly').objectStore('files').get(key);
                    req.onsuccess = () => res(req.result ?? null);
                    req.onerror   = () => res(null);
                });
            } catch { return null; }
        },
        set: async (key, val) => {
            try {
                const db = await open();
                return new Promise(res => {
                    const tx = db.transaction('files','readwrite');
                    const req = tx.objectStore('files').put(val, key);
                    req.onsuccess = () => res(true);
                    req.onerror   = () => res(false);
                });
            } catch { return false; }
        },
        del: async (key) => {
            try {
                const db = await open();
                return new Promise(res => {
                    const tx = db.transaction('files','readwrite');
                    const req = tx.objectStore('files').delete(key);
                    req.onsuccess = () => res(true);
                    req.onerror   = () => res(false);
                });
            } catch { return false; }
        },
    };
})();

// ─── Roller (Hybrid Picker) ─────────────────────────────────
const DRUM_H    = 48;
const DRUM_VIS  = 7;
const DRUM_HALF = 3;

const Roller = memo(({ value, onChange, min, max, step=1, label, isChanged, presets=[], jumpSteps=[] }) => {
    const [open,     setOpen]     = useState(false);
    const [localVal, setLocalVal] = useState(value);

    const listRef    = React.useRef(null);
    const settling   = React.useRef(false);
    const timerRef   = React.useRef(null);
    const fromBtn    = React.useRef(false);

    const options = useMemo(() => {
        const o = [];
        for (let v = min; v <= max; v = parseFloat((v + step).toFixed(10)))
            o.push(parseFloat(v.toFixed(4)));
        return o;
    }, [min, max, step]);

    const scrollTo = useCallback((idx, smooth=false) => {
        if (!listRef.current) return;
        listRef.current.scrollTo({ top: idx * DRUM_H, behavior: smooth ? 'smooth' : 'instant' });
    }, []);

    // כשנפתח — אתחל localVal לערך הנוכחי
    useEffect(() => { if (open) setLocalVal(value); }, [open]);

    // כשlocalVal משתנה מכפתור — גלול לשם
    useEffect(() => {
        if (!open) return;
        const idx = options.indexOf(localVal);
        if (idx < 0) return;
        settling.current = true;
        requestAnimationFrame(() => {
            scrollTo(idx, fromBtn.current);
            fromBtn.current = false;
            setTimeout(() => { settling.current = false; }, 400);
        });
    }, [localVal, open, options, scrollTo]);

    const handleScroll = useCallback(() => {
        if (settling.current) return;
        if (timerRef.current) clearTimeout(timerRef.current);
        timerRef.current = setTimeout(() => {
            if (!listRef.current) return;
            const idx = Math.round(listRef.current.scrollTop / DRUM_H);
            const c   = Math.min(Math.max(idx, 0), options.length - 1);
            settling.current = true;
            scrollTo(c, true);
            setLocalVal(options[c]);
            setTimeout(() => { settling.current = false; }, 250);
        }, 80);
    }, [options, scrollTo]);

    const adjust = useCallback((delta) => {
        setLocalVal(prev => {
            let idx = options.indexOf(prev);
            if (idx < 0) idx = options.reduce((b,o,i) => Math.abs(o-prev)<Math.abs(options[b]-prev)?i:b, 0);
            const ni = Math.min(Math.max(idx + Math.round(delta/step), 0), options.length-1);
            fromBtn.current = true;
            return options[ni];
        });
    }, [options, step]);

    const confirm = useCallback(() => { onChange(localVal); setOpen(false); }, [localVal, onChange]);

    return (
        <div className="flex flex-col items-center flex-1">
            <button onClick={() => setOpen(true)}
                className={`w-full h-14 rounded-xl font-black text-[22px] flex flex-col items-center justify-center gap-0.5 active:scale-95 transition-all
                    ${isChanged ? 'bg-blue-50 text-blue-600 ring-2 ring-blue-200' : 'bg-slate-100 text-slate-800'}`}>
                <span>{value}</span>
                <span className="text-[9px] font-black opacity-50 tracking-tighter uppercase">{label}</span>
            </button>
            {open && (
                <div className="fixed inset-0 z-[800] flex items-end" onClick={confirm}>
                    <div className="absolute inset-0 bg-slate-900/50" />
                    <div className="relative w-full bg-white rounded-t-3xl shadow-2xl" onClick={e => e.stopPropagation()}>
                        {/* כותרת */}
                        <div className="flex justify-between items-center px-5 pt-5 pb-2" dir="rtl">
                            <span className="text-base font-black text-slate-700">{label}</span>
                            <button onClick={confirm} className="px-5 py-2 bg-slate-900 text-white rounded-2xl font-black text-sm active:scale-95">אישור</button>
                        </div>
                        {/* מספרים קרובים */}
                        {(() => {
                            const nearby = [-5,-3,-2,0,2,3,5]
                                .map(d => parseFloat((localVal + d).toFixed(4)))
                                .filter(v => v >= min && v <= max);
                            return (
                                <div className="px-5 pb-2 flex gap-2 overflow-x-auto no-scrollbar justify-center">
                                    {nearby.map(p => (
                                        <button key={p}
                                            onClick={() => { if (p === localVal) { confirm(); return; } fromBtn.current=true; setLocalVal(p); }}
                                            className={`shrink-0 px-3 py-1.5 rounded-xl text-sm font-black active:scale-95 transition-all
                                                ${p===localVal ? 'bg-blue-600 text-white shadow-sm' : 'bg-slate-100 text-slate-700'}`}>
                                            {p}
                                        </button>
                                    ))}
                                </div>
                            );
                        })()}
                        {/* כפתורי קפיצה */}
                        <div className="px-4 pb-3 flex items-center gap-1.5 justify-center" dir="ltr">
                            {[...jumpSteps].reverse().map(s => (
                                <button key={`-${s}`} onClick={() => adjust(-s)}
                                    className="flex-1 py-5 bg-rose-50 text-rose-600 rounded-xl font-black text-lg active:scale-95 active:bg-rose-100">
                                    -{s}
                                </button>
                            ))}
                            <button onClick={confirm} className="px-3 py-2 bg-slate-900 text-white rounded-xl font-black text-xl min-w-[4.5rem] text-center active:scale-95 active:bg-slate-700">
                                {localVal}
                            </button>
                            {jumpSteps.map(s => (
                                <button key={`+${s}`} onClick={() => adjust(s)}
                                    className="flex-1 py-5 bg-emerald-50 text-emerald-600 rounded-xl font-black text-lg active:scale-95 active:bg-emerald-100">
                                    +{s}
                                </button>
                            ))}
                        </div>
                        {/* גלגלת לכוונון עדין */}
                        <div className="relative mx-6 mb-6" style={{height: DRUM_VIS * DRUM_H + 'px'}}>
                            <div className="absolute inset-x-0 pointer-events-none z-10"
                                style={{top: DRUM_HALF * DRUM_H + 'px', height: DRUM_H + 'px',
                                    background:'rgba(59,130,246,0.07)',
                                    borderTop:'2px solid rgba(59,130,246,0.3)',

// ─── PlankTimer ────────────────────────────────────────────
const PLANK_PRESETS = [20,30,45,60,90,120];
function PlankTimer() {
    const [seconds,   setSeconds]   = useState(60);
    const [remaining, setRemaining] = useState(null);
    const [running,   setRunning]   = useState(false);
    const itvRef = React.useRef(null);

    const start = () => { setRemaining(seconds); setRunning(true); };
    const stop  = () => { clearInterval(itvRef.current); setRunning(false); setRemaining(null); };

    useEffect(() => {
        if (!running) return;
        itvRef.current = setInterval(() => {
            setRemaining(r => {
                if (r <= 1) {
                    clearInterval(itvRef.current);
                    setRunning(false);
                    playPhoneRingSound();
                    return 0;
                }
                if (r <= 4) playCountdownBeep();
                return r - 1;
            });
        }, 1000);
        return () => clearInterval(itvRef.current);
    }, [running]);

    const pct = remaining !== null ? (remaining / seconds) * 100 : 100;
    const color = remaining <= 5 ? '#ef4444' : remaining <= 20 ? '#f59e0b' : '#84cc16';

    return (
        <div className="bg-lime-50 rounded-2xl border border-lime-200 p-4 mt-3">
            {remaining === null ? (<>
                <div className="text-[11px] font-black text-lime-600 mb-2">⏱ זמן פלאנק</div>
                <div className="flex gap-1.5 flex-wrap mb-3">
                    {PLANK_PRESETS.map(p => (
                        <button key={p} onClick={()=>setSeconds(p)}
                            className={`px-2.5 py-1 rounded-xl text-[12px] font-black active:scale-95 transition-all
                                ${p===seconds?'bg-lime-500 text-white':'bg-white border border-lime-200 text-lime-700'}`}>
                            {p}″
                        </button>
                    ))}
                </div>
                <div className="flex gap-2 items-center mb-3">
                    <button onClick={()=>setSeconds(s=>Math.max(10,s-5))} className="px-3 py-2 bg-rose-50 text-rose-500 rounded-xl font-black text-sm active:scale-95">-5</button>
                    <div className="flex-1 text-center text-3xl font-black text-slate-800">{seconds}″</div>
                    <button onClick={()=>setSeconds(s=>s+5)} className="px-3 py-2 bg-emerald-50 text-emerald-600 rounded-xl font-black text-sm active:scale-95">+5</button>
                </div>
                <button onClick={start} className="w-full py-3 bg-lime-500 text-white rounded-2xl font-black text-base active:scale-95 shadow-lg shadow-lime-200">
                    ▶ התחל פלאנק
                </button>
            </>) : (<>
                <div className="text-center mb-3">
                    <div className="text-6xl font-black tabular-nums" style={{color}}>{remaining}</div>
                    <div className="text-[11px] font-bold text-slate-400 mt-1">שניות</div>
                </div>
                <div className="h-4 bg-slate-200 rounded-full overflow-hidden mb-3 shadow-inner">
                    <div className="h-full rounded-full transition-all duration-1000" style={{width:`${pct}%`, background:color}} />
                </div>
                <button onClick={stop} className="w-full py-3 bg-slate-700 text-white rounded-2xl font-black text-base active:scale-95">
                    ⏹ עצור
                </button>
            </>)}
        </div>
    );
}

// ─── ExerciseEntryRow ──────────────────────────────────────
function ExerciseEntryRow({ ex, logs, sessionStartTime, onSave, onFinish, isLast, isSuperset, restTimer, restTimerTotal,
    forceSet1Disabled=false, forceSet2Disabled=false, prevRestTimer=0, prevRestTimerTotal=0, accentColor='#3b82f6', requestConfirm=null }) {
    const [s1, setS1] = useState({ w:10, r:10, wC:false, rC:false });
    const [s2, setS2] = useState({ w:10, r:10, wC:false, rC:false });

    const weightPresets = useMemo(() => [...new Set(
        [...logs].filter(l=>l.exId===ex.id).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp))
            .slice(0,30).map(l=>l.weight).filter(w=>w>0)
    )].slice(0,5), [logs, ex.id]);

    const repsPresets = useMemo(() => [...new Set(
        [...logs].filter(l=>l.exId===ex.id).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp))
            .slice(0,30).map(l=>l.reps).filter(r=>r>0)
    )].slice(0,5), [logs, ex.id]);
    const [isSaving, setIsSaving] = useState(false);

    const cameBack    = React.useRef(false);
    const initialized = React.useRef(false);
    // זיהוי "חזרה" לתרגיל שכבר הסתיים לפני כן
    useEffect(() => { if (done.s1 && done.s2) cameBack.current = true; }, []); // eslint-disable-line
    useEffect(() => {
        if (initialized.current || logs.length === 0) return;
        const last = [...logs].filter(l=>l.exId===ex.id)
            .sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp))[0];
        if (!last) return;
        setS1(p=>({...p, w:last.weight, r:last.reps}));
        setS2(p=>({...p, w:last.weight, r:last.reps}));
        initialized.current = true;
    }, [logs, ex.id]);

    useEffect(() => {
        initialized.current = false;
        setS1(p=>({...p,wC:false,rC:false}));
        setS2(p=>({...p,wC:false,rC:false}));
    }, [sessionStartTime]);

    const done = useMemo(() => ({
        s1: logs.some(l => l.exId===ex.id && l.setNum===1 && new Date(l.timestamp).getTime()>sessionStartTime),
        s2: logs.some(l => l.exId===ex.id && l.setNum===2 && new Date(l.timestamp).getTime()>sessionStartTime)
    }), [logs, ex.id, sessionStartTime]);

    const handleSetSave = async (num, state) => {
        const isDoneSet = num===1 ? done.s1 : done.s2;
        const doSave = async () => {
            setIsSaving(true);
            try {
                await onSave(ex.id, num, state.w, state.r, isSuperset);
                if (!isDoneSet) {
                    if (num===2 && isLast) setTimeout(onFinish, 800);
                }
                if (num===1) setS1(p=>({...p,wC:false,rC:false}));
                else setS2(p=>({...p,wC:false,rC:false}));
            } finally { setIsSaving(false); }
        };
        if (cameBack.current && requestConfirm) {
            requestConfirm('לשנות את נתוני הסט?', doSave);
        } else {
            await doSave();
        }
    };

    const handleSkipSet = async (num) => {
        setIsSaving(true);
        try {
            await onSave(ex.id, num, 0, 0, isSuperset);
            if (num === 1) setS2({w:0, r:0, wC:false, rC:false});
            if (num===2 && isLast) setTimeout(onFinish, 800);
        } finally { setIsSaving(false); }
    };

    const betweenTimer = done.s1 && !done.s2 && restTimerTotal > 0 && !forceSet2Disabled;

    const conicStyle = (rt, tot) => {
        if (!tot) return null;
        if (rt === 0) return { border:`4px solid ${accentColor}`, borderRadius:'1.6rem', boxShadow:`0 2px 12px ${accentColor}40` };
        const deg = (rt / tot) * 360;
        return {
            border:'4px solid transparent', borderRadius:'1.6rem',
            background:`linear-gradient(white,white) padding-box, conic-gradient(from -90deg, ${accentColor} 0deg, ${accentColor} ${deg}deg, #e2e8f0 ${deg}deg, #e2e8f0 360deg) border-box`
        };
    };

    return (
        <div className="space-y-0" dir="rtl">
            {[1,2].map((num) => {
                const state    = num===1 ? s1 : s2;
                const setState = num===1 ? setS1 : setS2;
                const isDone   = num===1 ? done.s1 : done.s2;
                const canAct   = !isSaving && (isDone ? true : (num===1 ? !forceSet1Disabled : (done.s1 && !forceSet2Disabled)));
                // סופרסט: Set2 ממתין לטיימר של התרגיל האחר — מציג ספירה לאחור
                const isCrossTimerSet2 = num===2 && !isDone && done.s1 && forceSet2Disabled && prevRestTimerTotal > 0 && prevRestTimer > 0;
                const hasConic1 = num===1 && !done.s1 && prevRestTimerTotal > 0;
                const hasConic2 = num===2 && (betweenTimer || isCrossTimerSet2);
                const conicRt   = hasConic2 ? (betweenTimer ? restTimer        : prevRestTimer)        : 0;
                const conicTot  = hasConic2 ? (betweenTimer ? restTimerTotal   : prevRestTimerTotal)   : 0;
                const conic     = hasConic1 ? conicStyle(prevRestTimer, prevRestTimerTotal)
                                : hasConic2 ? conicStyle(conicRt, conicTot)
                                : null;
                const countdown  = hasConic1 ? prevRestTimer : hasConic2 ? conicRt : 0;
                const showCDown  = !isDone && countdown > 0;
                const timerDone  = !isDone && !conic && (
                    (hasConic1 && prevRestTimer===0 && prevRestTimerTotal>0) ||
                    (num===2 && betweenTimer && restTimer===0)
                );
                const isActive    = !conic && canAct;
                const canActFinal = canAct || showCDown;
                return (
                    <React.Fragment key={num}>
                        <div style={conic || (isActive ? {border:`2px solid ${accentColor}`, boxShadow:`0 4px 16px ${accentColor}30`, borderRadius:'1.6rem'} : undefined)}
                            className={`bg-white p-3 rounded-[1.6rem] flex items-center gap-2 transition-all
                                ${conic    ? ''
                                : isActive ? ''
                                : isDone   ? 'border border-slate-100'
                                : timerDone? 'border border-slate-700 shadow-md'
                                :            'border border-slate-100 shadow-sm'}`}>
                            <div className="w-10 h-14 text-white rounded-xl flex flex-col items-center justify-center shrink-0 shadow-lg"
                                style={{background: (isActive || timerDone) ? accentColor : '#0f172a'}}>
                                <span className="text-[7px] font-black uppercase tracking-tighter opacity-60">SET</span>
                                <span className="text-base font-black leading-none">{num}</span>
                            </div>
                            <div className="flex flex-1 gap-2">
                                <Roller label="ק״ג"   min={0} max={250} step={0.5} value={state.w} isChanged={state.wC} onChange={v=>setState(p=>({...p,w:v,wC:true}))} presets={weightPresets} jumpSteps={[0.5,1,5]} />
                                <Roller label="חזרות" min={1} max={120}            value={state.r} isChanged={state.rC} onChange={v=>setState(p=>({...p,r:v,rC:true}))} presets={repsPresets}   jumpSteps={[1,2,3,5]} />
                            </div>
                            <button onClick={() => canActFinal && handleSetSave(num, state)} disabled={!canActFinal}
                                className={`px-4 h-14 rounded-2xl flex items-center justify-center font-black text-sm transition-all active:scale-95 shrink-0
                                    ${isDone && (state.wC||state.rC) ? 'bg-amber-100 text-amber-700 shadow-amber-100 shadow-md'
                                    : isDone    ? 'bg-slate-100 text-slate-400 shadow-none'
                                    : showCDown ? 'bg-blue-600 text-white shadow-blue-200 shadow-lg active:bg-blue-700'
                                    : !canAct   ? 'bg-slate-100 text-slate-300 shadow-none'
                                    : 'bg-emerald-500 text-white shadow-emerald-200 shadow-lg'}`}>
                                {isDone && (state.wC||state.rC) ? 'עדכן' : isDone ? 'בוצע' : isSaving ? '...' : showCDown ? countdown : 'סיום'}
                            </button>
                        </div>
                        {num===1 && <div className="h-1.5" />}
                    </React.Fragment>
                );
            })}

        </div>
    );
}

// ─── Backup helper ─────────────────────────────────────────
const triggerBackupDownload = data => {
    const blob = new Blob([JSON.stringify(data)], {type:'application/json'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    a.download = `gym-backup-${new Date().toLocaleDateString('he-IL').replace(/\./g,'-')}.json`;
    a.click();
    URL.revokeObjectURL(url);
};

// ─── Sound helpers ─────────────────────────────────────────
let _muteTimeout = null;
const playCountdownBeep = () => {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = 880; osc.type = 'sine';
        gain.gain.setValueAtTime(0.9, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
        osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.18);
    } catch(e) {}
};
const playWarningBeep = () => {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        [0, 0.3].forEach(offset => {
            const osc = ctx.createOscillator(); const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.frequency.value = 520; osc.type = 'sine';
            gain.gain.setValueAtTime(0.9, ctx.currentTime + offset);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + offset + 0.22);
            osc.start(ctx.currentTime + offset); osc.stop(ctx.currentTime + offset + 0.22);
        });
    } catch(e) {}
};
const playRestCompleteSound = () => {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        [500, 700, 950].forEach((freq, i) => {
            const osc = ctx.createOscillator(); const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.frequency.value = freq; osc.type = 'sine';
            gain.gain.setValueAtTime(1.0, ctx.currentTime + i * 0.22);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.22 + 0.25);
            osc.start(ctx.currentTime + i * 0.22); osc.stop(ctx.currentTime + i * 0.22 + 0.28);
        });
    } catch(e) {}
};
const playPhoneRingSound = () => {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        [[0, 0.5], [0.7, 1.2], [1.4, 1.9]].forEach(([s, e]) => {
            [440, 480].forEach(freq => {
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.frequency.value = freq; osc.type = 'sine';
                gain.gain.setValueAtTime(0, ctx.currentTime + s);
                gain.gain.linearRampToValueAtTime(0.4, ctx.currentTime + s + 0.02);
                gain.gain.setValueAtTime(0.4, ctx.currentTime + e - 0.02);
                gain.gain.linearRampToValueAtTime(0, ctx.currentTime + e);
                osc.start(ctx.currentTime + s); osc.stop(ctx.currentTime + e);
            });
        });
    } catch(e) {}
};

                                                onClick={() => isHidden ? onToggleExercise(ex.id) : requestConfirm('להסתיר את התרגיל?', () => onToggleExercise(ex.id))}
                                                className={`shrink-0 px-3 py-2 rounded-2xl text-[11px] font-black active:scale-95 transition-all
                                                    ${isHidden ? 'bg-indigo-500 text-white' : 'bg-slate-100 text-slate-500'}`}>
                                                {isHidden ? 'הפעל' : 'הסתר'}
                                            </button>
                                        </div>
                                    );
                                })}
                            </div>
                        ))}
                    </div>}
                </section>
                {/* ── גיבוי ושחזור ── */}
                <section className="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden">
                    <button onClick={()=>toggleSection('backup')} className="w-full flex items-center justify-between px-5 py-4 active:bg-slate-50">
                        <h3 className="text-lg font-black text-slate-800 flex items-center gap-2"><Icon name="Database" size={20} className="text-blue-500" /> גיבוי ושחזור</h3>
                        <Icon name={open.backup?'ChevronUp':'ChevronDown'} size={18} className="text-slate-400" />
                    </button>
                    {open.backup && <div className="px-5 pb-5 space-y-4">
                        <button onClick={handleBackup} className="w-full flex items-center gap-3 bg-blue-50 p-4 rounded-2xl border border-blue-100 text-blue-700 active:scale-[0.98]">
                            <div className="bg-blue-100 p-2 rounded-xl"><Icon name="Download" size={20} /></div>
                            <div><div className="font-black text-sm">גיבוי נתונים</div><div className="text-[10px] font-bold opacity-70">הורדת קובץ למכשיר</div></div>
                        </button>
                        <label className="w-full flex items-center gap-3 bg-indigo-50 p-4 rounded-2xl border border-indigo-100 text-indigo-700 cursor-pointer active:scale-[0.98]">
                            <div className="bg-indigo-100 p-2 rounded-xl"><Icon name="Upload" size={20} /></div>
                            <div><div className="font-black text-sm">שחזור נתונים</div><div className="text-[10px] font-bold opacity-70">העלאת קובץ גיבוי</div></div>
                            <input type="file" accept=".json" className="hidden" onChange={handleRestore} />
                        </label>
                    </div>}
                </section>
                {/* ── מוזיקה ── */}
                <section className="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden">
                    <button onClick={()=>toggleSection('music')} className="w-full flex items-center justify-between px-5 py-4 active:bg-slate-50">
                        <h3 className="text-lg font-black text-slate-800 flex items-center gap-2"><Icon name="Music" size={20} className="text-purple-500" /> מוזיקה ({musicList.length} קבצים)</h3>
                        <Icon name={open.music?'ChevronUp':'ChevronDown'} size={18} className="text-slate-400" />
                    </button>
                    {open.music && <div className="px-5 pb-5 space-y-3">
                        {musicList.length > 0 && (
                            <div className="space-y-1.5">
                                {musicList.map(t => (
                                    <div key={t.id} className="flex items-center gap-2 bg-slate-50 px-3 py-2 rounded-2xl border border-slate-100">
                                        <span className="flex-1 text-[12px] font-bold text-slate-700 truncate">{t.name}</span>
                                        <button onClick={()=>requestConfirm('למחוק שיר זה?',()=>onMusicRemoveOne(t.id))}
                                            className="text-slate-300 active:text-red-500"><Icon name="Trash2" size={14}/></button>
                                    </div>
                                ))}
                            </div>
                        )}
                        <label className="w-full flex items-center gap-3 bg-purple-50 p-4 rounded-2xl border border-purple-100 text-purple-700 cursor-pointer active:scale-[0.98]">
                            <div className="bg-purple-100 p-2 rounded-xl"><Icon name="Upload" size={20} /></div>
                            <div><div className="font-black text-sm">הוסף קבצי שמע</div><div className="text-[10px] font-bold opacity-70">MP3, M4A, AAC, OGG, WAV</div></div>
                            <input type="file" accept=".mp3,.m4a,.aac,.ogg,.wav,.flac" multiple className="hidden" onChange={e=>onMusicUpload(e.target.files)} />
                        </label>
                        {musicList.length > 0 && (
                            <button onClick={()=>requestConfirm('למחוק את כל המוזיקה?',onMusicRemoveAll)}
                                className="w-full flex items-center gap-3 bg-rose-50 p-4 rounded-2xl border border-rose-100 text-rose-600 active:scale-[0.98]">
                                <div className="bg-rose-100 p-2 rounded-xl"><Icon name="Trash" size={20} /></div>
                                <div className="font-black text-sm">מחק הכל</div>
                            </button>
                        )}
                    </div>}
                </section>
                {/* ── הגדרות אימון ── */}
                <section className="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden">
                    <button onClick={()=>toggleSection('settings')} className="w-full flex items-center justify-between px-5 py-4 active:bg-slate-50">
                        <h3 className="text-lg font-black text-slate-800 flex items-center gap-2"><Icon name="Settings" size={20} className="text-blue-500" /> הגדרות אימון</h3>
                        <Icon name={open.settings?'ChevronUp':'ChevronDown'} size={18} className="text-slate-400" />
                    </button>
                    {open.settings && <div className="px-5 pb-5 space-y-4">
                        {[
                            {label:'מנוחה לסט רגיל',  key:'normalRest',   opts:[60,90,120,150,180]},
                            {label:'מנוחה לסופר-סט',  key:'supersetRest', opts:[30,45,60,90,120]}
                        ].map(({label,key,opts})=>(
                            <div key={key} className="flex justify-between items-center bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                <span className="font-bold text-sm text-slate-700">{label}</span>
                                <select className="bg-white border border-slate-200 rounded-xl px-3 py-1 font-black text-blue-600 outline-none"
                                    value={settings[key]} onChange={e=>onUpdateSettings(key,Number(e.target.value))}>
                                    {opts.map(o=>{
                                        const m = Math.floor(o/60), s = o%60;
                                        const label = s===0 ? `${m} דק'` : m>0 ? `${m}:${String(s).padStart(2,'0')} דק'` : `${s} שנ'`;
                                        return <option key={o} value={o}>{label}</option>;
                                    })}
                                </select>
                            </div>
                        ))}
                    </div>}
                </section>
            </div>
        </div>
    );
};


// ─── App ───────────────────────────────────────────────────
function App() {
    const [view,             setView]             = useState('list');
    const [activeGroup,      setActiveGroup]      = useState(null);
    const [logs,             setLogs]             = useState(()=>LS.get('gym-logs',[]));
    const [workoutSec,       setWorkoutSec]       = useState(0);
    const [isWorkoutActive,  setIsWorkoutActive]  = useState(false);
    const [restTimers,       setRestTimers]       = useState({});
    const [restTimerTotals, setRestTimerTotals]   = useState({});
    const [hiddenExercises,  setHiddenExercises]  = useState(()=>new Set(LS.get('gym-hidden-exercises',[])));
    const [groupOrder,       setGroupOrder]       = useState(()=>{
        const saved = LS.get('gym-group-order', null);
        if (saved && saved.length === exerciseGroups.length) return saved;
        return exerciseGroups.map(g=>g.id);
    });
    const [sessionStartTime, setSessionStartTime] = useState(()=>{
        if (!LS.get('gym-migrated-start-v1', false)) {
            const t = new Date('2026-04-27').getTime();
            LS.set('gym-session-start', t);
            LS.set('gym-migrated-start-v1', true);
            return t;
        }
        return LS.get('gym-session-start', new Date('2026-04-27').getTime());
    });
    const [workoutStartTime, setWorkoutStartTime] = useState(()=>LS.get('gym-workout-start', Date.now()));
    const [sessionEndTime,   setSessionEndTime]   = useState(()=>LS.get('gym-session-end', null));
    const [editingDates,     setEditingDates]     = useState(null);
    const [scrollToExId,     setScrollToExId]     = useState(null);
    const [confirmAction,    setConfirmAction]    = useState(null);
    const [showNewWorkoutModal, setShowNewWorkoutModal] = useState(false);
    const [skippedGroups,    setSkippedGroups]    = useState([]);
    const [showSummary,      setShowSummary]      = useState(false);
    const [isWorkoutComplete,setIsWorkoutComplete]= useState(false);
    const [toast,            setToast]            = useState(null);
    const [notes,            setNotes]            = useState(()=>LS.get('gym-notes',{}));
    const [images,           setImages]           = useState(()=>LS.get('gym-images',{}));
    const [videos,           setVideos]           = useState(()=>LS.get('gym-videos',{}));
    const [settings,         setSettings]         = useState(()=>LS.get('gym-settings',{normalRest:90,supersetRest:60}));
    const [sessionDurations, setSessionDurations] = useState(()=>LS.get('gym-session-durations',{}));

    // מוזיקה — playlist מרובה
    const [musicList,      setMusicList]      = useState([]); // [{id,name,url}] runtime
    const [musicIndex,     setMusicIndex]     = useState(0);
    const [musicPanelOpen, setMusicPanelOpen] = useState(false);
    const [musicPlaying,   setMusicPlaying]   = useState(false);
    const audioRef        = React.useRef(null);
    const musicPlayingRef = React.useRef(false);
    const musicListRef    = React.useRef([]);
    useEffect(()=>{ musicPlayingRef.current = musicPlaying; },[musicPlaying]);
    useEffect(()=>{ musicListRef.current = musicList; },[musicList]);

    // טעינת playlist מ-IDB בעת אתחול
    useEffect(()=>{
        const meta = LS.get('gym-music-list', []);
        if (!meta.length) return;
        Promise.all(meta.map(({id,name}) =>
            IDB.get(`music-${id}`).then(blob => blob ? {id, name, url:URL.createObjectURL(blob)} : null)
        )).then(results => {
            const valid = results.filter(Boolean);
            setMusicList(valid);
            if (valid.length !== meta.length)
                LS.set('gym-music-list', valid.map(({id,name})=>({id,name})));
        });
    },[]);

    const handleMusicUpload = (files) => {
        if (!files?.length) return;
        // יצירת blob URLs סינכרונית — בתוך ה-user gesture
        const newItems = Array.from(files).map(file => ({
            id: `${Date.now()}-${Math.random().toString(36).slice(2,6)}`,
            name: file.name,
            url: URL.createObjectURL(file),
            _file: file
        }));
        // התחל לנגן מיד — עדיין בתוך ה-user gesture
        const a = audioRef.current;
        const startIdx = musicListRef.current.length;
        if (a && newItems[0]) {
            a.src = newItems[0].url;
            a.play().catch(e => showToast(e.message || 'שגיאת פליי', true));
        }
        setMusicIndex(startIdx);
        setMusicList(prev => {
            const next = [...prev, ...newItems.map(({id,name,url})=>({id,name,url}))];
            LS.set('gym-music-list', next.map(({id,name})=>({id,name})));
            return next;
        });
        // שמירה ל-IDB ברקע (לא חוסם gesture)
        newItems.forEach(({id, _file}) => IDB.set(`music-${id}`, _file));
        showToast(`${newItems.length} קבצים נשמרו`);
    };
    const handleMusicRemoveOne = async (id) => {
        await IDB.del(`music-${id}`);
        setMusicList(prev => {
            const next = prev.filter(t=>t.id!==id);
            LS.set('gym-music-list', next.map(({id,name})=>({id,name})));
            return next;
        });
        setMusicIndex(i => 0);
    };
    const handleMusicRemoveAll = async () => {
        const meta = LS.get('gym-music-list', []);
        await Promise.all(meta.map(({id})=>IDB.del(`music-${id}`)));
        LS.set('gym-music-list', []);
        setMusicList([]); setMusicIndex(0); setMusicPlaying(false);
    };

    const requestConfirm = useCallback((text,onConfirm,onCancel)=>setConfirmAction({text,onConfirm,onCancel}),[]);
    const showToast      = useCallback((msg,isError=false)=>{ setToast({msg,isError}); setTimeout(()=>setToast(null),2500); },[]);

    // שמירה אוטומטית ב-localStorage
    useEffect(()=>{ LS.set('gym-logs',           logs);             },[logs]);
    useEffect(()=>{ LS.set('gym-notes',          notes);            },[notes]);
    useEffect(()=>{ LS.set('gym-images',         images);           },[images]);
    useEffect(()=>{ LS.set('gym-videos',         videos);           },[videos]);
    useEffect(()=>{ LS.set('gym-settings',       settings);         },[settings]);
    useEffect(()=>{ LS.set('gym-group-order',    groupOrder);       },[groupOrder]);
    useEffect(()=>{ LS.set('gym-hidden-exercises',[...hiddenExercises]); },[hiddenExercises]);
    useEffect(()=>{ LS.set('gym-session-start',   sessionStartTime);  },[sessionStartTime]);
    useEffect(()=>{ LS.set('gym-workout-start',   workoutStartTime);  },[workoutStartTime]);
    useEffect(()=>{ LS.set('gym-session-end',       sessionEndTime);    },[sessionEndTime]);
    useEffect(()=>{ LS.set('gym-session-durations', sessionDurations);  },[sessionDurations]);

    // גיבוי יומי אוטומטי
    useEffect(()=>{
        const last = LS.get('gym-last-backup', 0);
        if (Date.now() - last > 86400000) {
            triggerBackupDownload({
                logs:          LS.get('gym-logs',           []),
                notes:         LS.get('gym-notes',          {}),
                images:        LS.get('gym-images',         {}),
                videos:        LS.get('gym-videos',         {}),
                settings:      LS.get('gym-settings',       {normalRest:90,supersetRest:60}),
                sessionStart:  LS.get('gym-session-start',  null),
                sessionEnd:    LS.get('gym-session-end',    null),
                groupOrder:    LS.get('gym-group-order',    null),
                lastWorkoutSec:  LS.get('gym-last-workout-sec',  0),
                showDetails:     LS.get('gym-show-details',     {}),
                sessionDurations:LS.get('gym-session-durations', {})
            });
            LS.set('gym-last-backup', Date.now());
        }
    },[]);

    // חסימת כפתור חזרה של הטלפון במסך תרגיל
    useEffect(()=>{
        if (view!=='detail') return;
        history.pushState(null,'');
        const handler = ()=>{
            if (_videoModalOpen) return;
            setView('list'); setActiveGroup(null);
        };
        window.addEventListener('popstate', handler);
        return ()=>window.removeEventListener('popstate', handler);
    },[view]);

    // Timers
    useEffect(()=>{
        if (!isWorkoutActive) return;
        const t = setInterval(()=>setWorkoutSec(s=>s+1),1000);
        return ()=>clearInterval(t);
    },[isWorkoutActive]);

    // ref לגישה מה-interval ללא closure ישן
    const restTimersRef = React.useRef({});
    useEffect(()=>{ restTimersRef.current = restTimers; },[restTimers]);
    const logsRef = React.useRef(logs);
    useEffect(()=>{ logsRef.current = logs; },[logs]);
    const sstRef = React.useRef(workoutStartTime);
    useEffect(()=>{ sstRef.current = workoutStartTime; },[workoutStartTime]);
    const skippedRef = React.useRef(skippedGroups);
    useEffect(()=>{ skippedRef.current = skippedGroups; },[skippedGroups]);

    useEffect(()=>{
        const t = setInterval(()=>{
            const cur = restTimersRef.current;
            if (Object.keys(cur).length === 0) return;
            const next = {};
            let doCountdown = false, doWarning = false, completedExId = null;
            Object.entries(cur).forEach(([k,v])=>{
                if (v > 1) {
                    next[k] = v - 1;
                    if (v <= 3) doCountdown = true;
                    if (v === 21) doWarning = true;
                } else if (v === 1) {
                    completedExId = k;
                }
            });
            // הנמך מוזיקה זמנית לפני צפצוף
            if ((doCountdown || doWarning || completedExId) && musicPlayingRef.current && audioRef.current) {
                audioRef.current.volume = 0.07;
                clearTimeout(_muteTimeout);
                _muteTimeout = setTimeout(() => { if (audioRef.current) audioRef.current.volume = 1; }, 2400);
            }
            if (doCountdown)   playCountdownBeep();
            if (doWarning)     playWarningBeep();
            if (completedExId) {
                playPhoneRingSound();
                const curLogs = logsRef.current;
                const curSst  = sstRef.current;
                const curSkip = skippedRef.current;
                const targetGroup = exerciseGroups.find(g => g.exercises.some(e => e.id === completedExId));
                if (targetGroup) {
                    const isDoneEx = ex => {
                        const sl = curLogs.filter(l => l.exId === ex.id && new Date(l.timestamp).getTime() > curSst);
                        return sl.some(l=>l.setNum===1) && sl.some(l=>l.setNum===2);
                    };
                    const groupDone = targetGroup.exercises.every(isDoneEx);
                    if (groupDone) {
                        const nextGroup = exerciseGroups.find(g => {
                            if (curSkip.includes(g.id)) return false;
                            return !g.exercises.every(isDoneEx);
                        });
                        if (nextGroup) {
                            setActiveGroup(nextGroup); setView('detail');
                            setScrollToExId(nextGroup.exercises[0].id);
                        }
                    } else {
                        setActiveGroup(targetGroup); setView('detail');
                        if (targetGroup.isSuperset && targetGroup.exercises.length === 2) {
                            const [ta, tb] = targetGroup.exercises;
                            const dA1 = curLogs.some(l=>l.exId===ta.id&&l.setNum===1&&new Date(l.timestamp).getTime()>curSst);
                            const dB1 = curLogs.some(l=>l.exId===tb.id&&l.setNum===1&&new Date(l.timestamp).getTime()>curSst);
                            const dA2 = curLogs.some(l=>l.exId===ta.id&&l.setNum===2&&new Date(l.timestamp).getTime()>curSst);
                            const dB2 = curLogs.some(l=>l.exId===tb.id&&l.setNum===2&&new Date(l.timestamp).getTime()>curSst);
                            const nextId = !dA1 ? ta.id : !dB1 ? tb.id : !dA2 ? ta.id : !dB2 ? tb.id : null;
                            setScrollToExId(nextId || completedExId);
                        } else {
                            const nextEx = targetGroup.exercises.find(ex => {
                                const sl = curLogs.filter(l => l.exId===ex.id && new Date(l.timestamp).getTime()>curSst);
                                return !sl.some(l=>l.setNum===1) || !sl.some(l=>l.setNum===2);
                            });
                            setScrollToExId(nextEx ? nextEx.id : completedExId);
                        }
                    }
                } else {
                    setScrollToExId(completedExId);
                }
            }
            setRestTimers(next);
        },1000);
        return ()=>clearInterval(t);
    },[]);

    const handleUpdateSettings = (key,value) => {
        const newSettings = key==='_bulk' ? value : {...settings,[key]:value};
        setSettings(newSettings);
    };

    const playSetCompleteSound = () => {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const now = ctx.currentTime;
            const notes = [800, 600, 800];
            const duration = 0.1;
            notes.forEach((freq, i) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.value = freq;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.3, now + i*duration);
                gain.gain.exponentialRampToValueAtTime(0.01, now + i*duration + duration*0.8);
                osc.start(now + i*duration);
                osc.stop(now + i*duration + duration);
            });
        } catch (e) {}
    };

    const handleSaveSet = (exId,setNum,weight,reps,isSuperset) => {
        const newLog = {id:crypto.randomUUID(), exId, setNum, weight, reps, timestamp:new Date().toISOString()};
        const wst = sstRef.current;
        const isReplace = logsRef.current.some(l=>l.exId===exId&&l.setNum===setNum&&new Date(l.timestamp).getTime()>wst);
        if (isReplace) {
            setLogs(prev=>[...prev.filter(l=>!(l.exId===exId&&l.setNum===setNum&&new Date(l.timestamp).getTime()>wst)), newLog]);
            return;
        }
        setLogs(prev=>[...prev, newLog]);
        const dur = isSuperset ? settings.supersetRest : settings.normalRest;
        setRestTimers({[exId]: dur});
        setRestTimerTotals(prev => ({...prev, [exId]: dur}));
        // סופרסט: קפיצה מיידית לתרגיל הבא בסדר A1→B1→A2→B2
        if (isSuperset) {
            const sg = exerciseGroups.find(g=>g.exercises.some(e=>e.id===exId));
            if (sg && sg.isSuperset && sg.exercises.length===2) {
                const [ta,tb] = sg.exercises;
                const wst = sstRef.current;
                const allLogs = [...logsRef.current, newLog];
                const dA1 = allLogs.some(l=>l.exId===ta.id&&l.setNum===1&&new Date(l.timestamp).getTime()>wst);
                const dB1 = allLogs.some(l=>l.exId===tb.id&&l.setNum===1&&new Date(l.timestamp).getTime()>wst);
                const dA2 = allLogs.some(l=>l.exId===ta.id&&l.setNum===2&&new Date(l.timestamp).getTime()>wst);
                const dB2 = allLogs.some(l=>l.exId===tb.id&&l.setNum===2&&new Date(l.timestamp).getTime()>wst);
                const nextId = !dA1 ? ta.id : !dB1 ? tb.id : !dA2 ? ta.id : !dB2 ? tb.id : null;
                if (nextId && nextId !== exId) setTimeout(()=>setScrollToExId(nextId), 50);
            }
        }
    };

    const handleSaveNote = (exId,text) => {
        setNotes(prev=>({...prev,[exId]:text}));
    };

    const handleSaveVideo = (exId, url) => {
        if (!url.trim()) return;
        const match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([A-Za-z0-9_-]{11})/);
        const videoId = match ? match[1] : null;
        if (!videoId) { showToast('קישור YouTube לא תקין', true); return; }
        setVideos(prev=>({...prev,[exId]:videoId}));
        showToast('הסרטון נשמר');
    };

    const handleDeleteVideo = (exId) => {
        setVideos(prev=>{ const n={...prev}; delete n[exId]; return n; });
        showToast('הסרטון הוסר');
    };

    const handleRemoveImage = (exId) => {
        setImages(prev=>{ const n={...prev}; delete n[exId]; return n; });
        showToast('התמונה הוסרה');
    };

    const handleSaveImage = (exId, file) => {
        if (!file) return;
        showToast('טוען תמונה...');
        const canvas = document.createElement('canvas');
        const ctx    = canvas.getContext('2d');
        const img    = new Image();
        const reader = new FileReader();
        reader.onload = ev => {
            img.onload = () => {
                const MAX = 800;
                const ratio = Math.min(MAX/img.width, MAX/img.height, 1);
                canvas.width  = Math.round(img.width  * ratio);
                canvas.height = Math.round(img.height * ratio);
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                const url = canvas.toDataURL('image/jpeg', 0.8);
                setImages(prev=>({...prev,[exId]:url}));
                showToast('התמונה נשמרה');
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    };

    const startNewWorkout = ()=>{
        const wst = Date.now();
        setWorkoutSec(0); setIsWorkoutActive(false); setRestTimers({}); setRestTimerTotals({});
        setSkippedGroups([]); setShowSummary(false); setIsWorkoutComplete(false);
        setWorkoutStartTime(wst); setView('list'); setActiveGroup(null);
    };

    const handleDeleteLog  = id=>{
        setLogs(prev=>prev.filter(l=>l.id!==id));
        showToast('הרשומה נמחקה');
    };
    const handleDeleteDate = items=>{
        const ids = new Set(items.map(i=>i.id));
        setLogs(prev=>prev.filter(l=>!ids.has(l.id)));
        showToast('יום האימון נמחק');
    };

    const sortedGroups = useMemo(()=>
        groupOrder.map(id=>exerciseGroups.find(g=>g.id===id)).filter(Boolean)
    ,[groupOrder]);

    const handleToggleExercise = useCallback((exId) => {
        setHiddenExercises(prev => {
            const next = new Set(prev);
            if (next.has(exId)) next.delete(exId); else next.add(exId);
            return next;
        });
    }, []);

    const visibleGroups = useMemo(()=>
        sortedGroups.map(g => {
            const visExs = g.exercises.filter(e => !hiddenExercises.has(e.id));
            if (!visExs.length) return null;
            return {...g, exercises: visExs};
        }).filter(Boolean)
    ,[sortedGroups, hiddenExercises]);

    const handleMoveGroup = (idx, dir) => {
        setGroupOrder(prev=>{
            const next = [...prev];
            const target = idx + dir;
            if (target < 0 || target >= next.length) return prev;
            [next[idx], next[target]] = [next[target], next[idx]];
            return next;
        });
    };

    const isGroupDone = useCallback((g)=>
        skippedGroups.includes(g.id) ||
        g.exercises.every(ex=>{
            const sl = logs.filter(l=>l.exId===ex.id && new Date(l.timestamp).getTime()>workoutStartTime);
            return sl.some(l=>l.setNum===1) && sl.some(l=>l.setNum===2);
        })
    ,[logs,workoutStartTime,skippedGroups]);

    const completedCount    = useMemo(()=>visibleGroups.filter(isGroupDone).length,          [visibleGroups,isGroupDone]);
    const nextIncompleteIndex = useMemo(()=>visibleGroups.findIndex(g=>!isGroupDone(g)),     [visibleGroups,isGroupDone]);

    useEffect(()=>{
        if (view!=='list') return;
        setTimeout(()=>{
            const idx = nextIncompleteIndex>0 ? nextIncompleteIndex-1 : 0;
            document.getElementById(`ex-btn-${idx}`)?.scrollIntoView({behavior:'smooth',block:'center'});
        },250);
    },[view,nextIncompleteIndex]);

    const handleSkipGroup = useCallback((groupId)=>{
        setSkippedGroups(prev=>{
            const newSkipped = prev.includes(groupId) ? prev.filter(id=>id!==groupId) : [...prev, groupId];
            const allDone = visibleGroups.every(g=>{
                if (newSkipped.includes(g.id)) return true;
                return g.exercises.every(ex=>{
                    const sl = logs.filter(l=>l.exId===ex.id && new Date(l.timestamp).getTime()>workoutStartTime);
                    return sl.some(l=>l.setNum===1) && sl.some(l=>l.setNum===2);
                });
            });
            if (allDone && newSkipped.length > 0) {
                setTimeout(()=>{
                    setIsWorkoutActive(false); setIsWorkoutComplete(true);
                    if (workoutSec > 0) { LS.set('gym-last-workout-sec', workoutSec); setSessionDurations(p=>({...p,[workoutStartTime]:workoutSec})); }
                    setShowSummary(true);
                }, 300);
            }
            return newSkipped;
        });
    },[visibleGroups,logs,workoutStartTime,workoutSec]);

    const handleExerciseComplete = useCallback(()=>{
        // קריאה ישירה מ-refs כדי להימנע מ-stale closure אחרי setLogs
        const curLogs = logsRef.current;
        const curWst  = sstRef.current;
        const curSkip = skippedRef.current;
        const isDone = g => curSkip.includes(g.id) || g.exercises.every(ex=>{
            const sl = curLogs.filter(l=>l.exId===ex.id && new Date(l.timestamp).getTime()>curWst);
            return sl.some(l=>l.setNum===1) && sl.some(l=>l.setNum===2);
        });
        const nextGroup = visibleGroups.find(g=>!isDone(g));
        if (nextGroup) {
            setActiveGroup(nextGroup); setView('detail');
            setScrollToExId(nextGroup.exercises[0].id);
        } else {
            setIsWorkoutActive(false); setIsWorkoutComplete(true);
            LS.set('gym-last-workout-sec', workoutSec);
            if (workoutSec > 0) setSessionDurations(prev=>({...prev, [workoutStartTime]: workoutSec}));
            setShowSummary(true);
            setView('list');
            setActiveGroup(null);
        }
    },[sortedGroups,workoutSec,workoutStartTime]);

    const handleOpenExercise = group=>{
        if (workoutSec===0&&!isWorkoutActive) {
            requestConfirm('להפעיל טיימר?',
                ()=>{ const wst=Date.now(); setWorkoutStartTime(wst); setIsWorkoutActive(true); setActiveGroup(group); setView('detail'); },
                ()=>{                                                                            setActiveGroup(group); setView('detail'); }
            );
        } else { setActiveGroup(group); setView('detail'); }
    };

    // Overlays — תמיד מעל (כולל audio — נשאר פעיל בכל view)
    const overlays = (
        <>
            <audio ref={audioRef}
                onPlay={()=>setMusicPlaying(true)} onPause={()=>setMusicPlaying(false)}
                onEnded={()=>{
                    const list = musicListRef.current;
                    if (!list.length || !audioRef.current) return;
                    if (list.length === 1) { audioRef.current.currentTime=0; audioRef.current.play().catch(()=>{}); return; }
                    const next = (musicIndex + 1) % list.length;
                    setMusicIndex(next);
                    audioRef.current.src = list[next].url;
                    audioRef.current.play().catch(()=>{});
                }}
                style={{display:'none'}} />
            {confirmAction && (
                <div className="fixed inset-0 z-[999] bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4" dir="rtl">
                    <div className="bg-white rounded-3xl p-6 w-full max-w-xs shadow-2xl">
                        <h3 className="text-lg font-black text-slate-800 mb-5 text-center">{confirmAction.text}</h3>
                        <div className="flex gap-3">
                            <button onClick={()=>{ confirmAction.onCancel?.(); setConfirmAction(null); }} className="flex-1 p-3 rounded-xl font-bold text-slate-500 bg-slate-100 active:scale-95">ביטול</button>
                            <button onClick={()=>{ confirmAction.onConfirm(); setConfirmAction(null); }} className="flex-1 p-3 rounded-xl font-bold text-white bg-blue-600 active:scale-95">אישור</button>
                        </div>
                    </div>
                </div>
            )}
            {/* תיקון 5: AlertCircle לשגיאה, CheckCircle2 להצלחה */}
            {toast && (
                <div className="fixed bottom-24 left-1/2 -translate-x-1/2 z-[1000] w-[90%] max-w-[300px]">
                    <div className={`px-5 py-3 rounded-2xl shadow-2xl font-black text-sm flex items-center justify-center gap-2 ${toast.isError?'bg-rose-500':'bg-emerald-500'} text-white`}>
                        <Icon name={toast.isError?'AlertCircle':'CheckCircle2'} size={20} /> {toast.msg}
                    </div>
                </div>
            )}
            {/* סיכום אימון */}
            {showSummary && (()=>{
                const sessionLogs = logs.filter(l=>new Date(l.timestamp).getTime()>workoutStartTime);
                const totalSets   = sessionLogs.length;
                const doneCount   = sortedGroups.filter(g=>!skippedGroups.includes(g.id)&&isGroupDone(g)).length;
                const skipCount   = skippedGroups.length;
                return (
                    <div className="fixed inset-0 z-[999] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4" dir="rtl">
                        <div className="bg-white rounded-3xl p-6 w-full max-w-xs shadow-2xl space-y-4">
                            <div className="text-center">
                                <div className="text-4xl mb-1">🏆</div>
                                <h3 className="text-xl font-black text-slate-800">כל הכבוד!</h3>
                            </div>
                            <div className="grid grid-cols-2 gap-2">
                                <div className="bg-blue-50 rounded-2xl p-3 text-center">
                                    <div className="text-lg font-black text-blue-600">{fmtDur(workoutSec)}</div>
                                    <div className="text-[10px] font-bold text-blue-400">זמן אימון</div>
                                </div>
                                <div className="bg-emerald-50 rounded-2xl p-3 text-center">
                                    <div className="text-lg font-black text-emerald-600">{doneCount}/{sortedGroups.length}</div>
                                    <div className="text-[10px] font-bold text-emerald-400">תרגילים</div>
                                </div>
                                <div className="col-span-2 bg-indigo-50 rounded-2xl p-3 text-center">
                                    <div className="text-lg font-black text-indigo-600">{totalSets}</div>
                                    <div className="text-[10px] font-bold text-indigo-400">סטים</div>
                                </div>
                                {skipCount > 0 && (
                                    <div className="col-span-2 bg-orange-50 rounded-2xl p-3 text-center">
                                        <div className="text-lg font-black text-orange-500">{skipCount}</div>
                                        <div className="text-[10px] font-bold text-orange-400">דולגו</div>
                                    </div>
                                )}
                            </div>
                            <button onClick={()=>{
                                triggerBackupDownload({logs, notes, images, videos, settings, groupOrder,
                                    sessionStart:sessionStartTime, sessionEnd:sessionEndTime,
                                    lastWorkoutSec:workoutSec, showDetails:LS.get('gym-show-details',{}),
                                    sessionDurations:{...sessionDurations,...(workoutSec>0?{[workoutStartTime]:workoutSec}:{})}});
                                showToast('הגיבוי הורד');
                            }} className="w-full p-3 rounded-xl font-bold text-blue-700 bg-blue-50 border border-blue-200 active:scale-95 flex items-center justify-center gap-2">
                                <Icon name="Download" size={16}/> גיבוי אימון
                            </button>
                            <button onClick={()=>setShowSummary(false)} className="w-full p-3 rounded-xl font-bold text-white bg-blue-600 active:scale-95">סגור</button>
                        </div>
                    </div>
                );
            })()}
            {/* Modal אימון חדש */}
            {showNewWorkoutModal && (
                <div className="fixed inset-0 z-[999] bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4" dir="rtl">
                    <div className="bg-white rounded-3xl p-6 w-full max-w-xs shadow-2xl">
                        <h3 className="text-lg font-black text-slate-800 mb-2 text-center">אימון חדש</h3>
                        <p className="text-sm text-slate-500 text-center mb-5">לשמור גיבוי של האימון הנוכחי לפני האיפוס?</p>
                        <div className="flex flex-col gap-2">
                            <button onClick={()=>{
                                if (workoutSec > 0) setSessionDurations(prev=>({...prev, [workoutStartTime]: workoutSec}));
                                triggerBackupDownload({logs, notes, images, videos, settings, groupOrder, sessionStart:sessionStartTime, sessionEnd:sessionEndTime, lastWorkoutSec:LS.get('gym-last-workout-sec',0), showDetails:LS.get('gym-show-details',{}), sessionDurations:{...sessionDurations, ...(workoutSec>0?{[workoutStartTime]:workoutSec}:{})}});
                                setShowNewWorkoutModal(false);
                                startNewWorkout();
                            }} className="w-full p-3 rounded-xl font-bold text-white bg-blue-600 active:scale-95">שמור גיבוי והתחל</button>
                            <button onClick={()=>{ setShowNewWorkoutModal(false); startNewWorkout(); }}
                                className="w-full p-3 rounded-xl font-bold text-white bg-rose-500 active:scale-95">התחל בלי שמירה</button>
                            <button onClick={()=>setShowNewWorkoutModal(false)}
                                className="w-full p-3 rounded-xl font-bold text-slate-500 bg-slate-100 active:scale-95">ביטול</button>
                        </div>
                    </div>
                </div>
            )}
            {/* Modal עריכת תאריכים */}
            {editingDates && (
                <div className="fixed inset-0 z-[999] bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4" dir="rtl">
                    <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl space-y-4">
                        <h3 className="text-lg font-black text-slate-800 text-center">עדכון תאריכים</h3>
                        <div className="space-y-3">
                            <div>
                                <label className="block text-sm font-bold text-slate-600 mb-2">תאריך התחלה</label>
                                <input type="date" value={new Date(editingDates.start).toISOString().split('T')[0]}
                                    onChange={e=>{
                                        const newStart = new Date(e.target.value).getTime();
                                        const oldStart = new Date(editingDates.start).getTime();
                                        const diff = newStart - oldStart;
                                        setEditingDates({
                                            start: newStart,
                                            end: editingDates.end ? editingDates.end + diff : newStart
                                        });
                                    }}
                                    className="w-full p-3 border border-slate-200 rounded-2xl font-bold text-slate-800" />
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-slate-600 mb-2">הוסף חודשים</label>
                                <input type="number" min="0" placeholder="0"
                                    onChange={e=>{
                                        const months = parseInt(e.target.value) || 0;
                                        const start = new Date(editingDates.start);
                                        const end = new Date(start);
                                        end.setMonth(end.getMonth() + months);
                                        setEditingDates({...editingDates, end: end.getTime()});
                                    }}
                                    className="w-full p-3 border border-slate-200 rounded-2xl font-bold text-slate-800" />
                            </div>
                            <div className="pt-2 bg-blue-50 p-3 rounded-2xl">
                                <div className="text-sm font-bold text-slate-600 mb-1">תאריך סוף צפוי:</div>
                                <div className="text-lg font-black text-blue-600">
                                    {editingDates.end ? new Date(editingDates.end).toLocaleDateString('he-IL') : 'לא הוגדר'}
                                </div>
                            </div>
                        </div>
                        <div className="flex gap-3 pt-2">
                            <button onClick={()=>setEditingDates(null)} className="flex-1 p-3 rounded-xl font-bold text-slate-500 bg-slate-100 active:scale-95">ביטול</button>
                            <button onClick={()=>{
                                setSessionStartTime(editingDates.start);
                                setSessionEndTime(editingDates.end);
                                setEditingDates(null);
                                showToast('תאריכים עודכנו');
                            }} className="flex-1 p-3 rounded-xl font-bold text-white bg-blue-600 active:scale-95">שמור</button>
                        </div>
                    </div>
                </div>
            )}
        </>
    );

    if (view==='detail'&&activeGroup) { const _gi=visibleGroups.findIndex(g=>g.id===activeGroup.id); const _next=visibleGroups[_gi+1]||null; return <>{overlays}<DetailView group={activeGroup} logs={logs} restTimers={restTimers} restTimerTotals={restTimerTotals} sessionStartTime={workoutStartTime} notes={notes} onSaveNote={handleSaveNote} images={images} onSaveImage={handleSaveImage} onRemoveImage={handleRemoveImage} videos={videos} onSaveVideo={handleSaveVideo} onDeleteVideo={handleDeleteVideo} onBack={()=>{setView('list');setActiveGroup(null);}} onFinish={handleExerciseComplete} onSave={handleSaveSet} scrollToExId={scrollToExId} onScrollDone={()=>setScrollToExId(null)} onDeleteLog={handleDeleteLog} requestConfirm={requestConfirm} groupIdx={_gi} totalGroups={visibleGroups.length} nextGroup={_next} onNavigateTo={(g)=>{setActiveGroup(g);setScrollToExId(g.exercises[0].id);}} /></>; }
    if (view==='history') return <>{overlays}<HistoryView logs={logs} sessionDurations={sessionDurations} onBack={()=>setView('list')} onDeleteDate={handleDeleteDate} onDeleteOne={handleDeleteLog} requestConfirm={requestConfirm} /></>;
    if (view==='manage')  return <>{overlays}<ManageView  logs={logs} notes={notes} images={images} videos={videos} settings={settings} sessionStartTime={sessionStartTime} sessionEndTime={sessionEndTime} groupOrder={groupOrder} onUpdateSettings={handleUpdateSettings} onBack={()=>setView('list')} requestConfirm={requestConfirm} showToast={showToast} setLogs={setLogs} setNotes={setNotes} setImages={setImages} setVideos={setVideos} setSessionStartTime={setSessionStartTime} setSessionEndTime={setSessionEndTime} setGroupOrder={setGroupOrder} musicList={musicList} onMusicUpload={handleMusicUpload} onMusicRemoveOne={handleMusicRemoveOne} onMusicRemoveAll={handleMusicRemoveAll} hiddenExercises={hiddenExercises} onToggleExercise={handleToggleExercise} onNavigateToGroup={(g)=>{setActiveGroup(g);setView('detail');setScrollToExId(g.exercises[0].id);}} /></>;

    // List view
    return (
        <>
        {overlays}
        <div className="max-w-md mx-auto h-screen bg-slate-50 flex flex-col overflow-hidden shadow-2xl relative" dir="rtl">
            <header className="bg-white pb-2 rounded-b-[2.5rem] shadow-sm sticky top-0 z-10 border-b border-slate-100 shrink-0">
                <div className="w-full relative overflow-hidden" style={{background:'linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#0f172a 100%)'}}>
                    <div className="absolute inset-0 opacity-10" style={{backgroundImage:'repeating-linear-gradient(45deg,#fff 0,#fff 1px,transparent 0,transparent 50%)',backgroundSize:'12px 12px'}}/>
                    <div className="relative py-5 px-4 flex flex-col items-center gap-1">
                        <div className="flex items-center gap-2">
                            <Icon name="Dumbbell" size={20} className="text-blue-400" />
                            <h1 className="text-2xl font-black text-white tracking-widest" style={{letterSpacing:'0.15em'}}>אימון פול-באדי</h1>
                            <Icon name="Dumbbell" size={20} className="text-blue-400" />
                        </div>
                        <div className="h-[2px] w-24 rounded-full bg-gradient-to-r from-transparent via-blue-400 to-transparent"/>
                    </div>
                    <span className="absolute bottom-2 left-3 text-[13px] text-white/40 font-bold" dir="ltr">v.{APP_VERSION}</span>
                </div>
                {(() => {
                    const start = new Date(sessionStartTime);
                    const end = sessionEndTime ? new Date(sessionEndTime) : null;
                    const now = new Date();
                    const daysTotal = end ? Math.floor((end - start) / (1000*60*60*24)) : 0;
                    const daysPassed = end ? Math.floor((now - start) / (1000*60*60*24)) : 0;
                    const daysRemaining = Math.max(0, daysTotal - daysPassed);
                    const progress = daysTotal > 0 ? Math.min(100, (daysPassed / daysTotal) * 100) : 0;
                    const timerStr = `${String(Math.floor(workoutSec/60)).padStart(2,'0')}:${String(workoutSec%60).padStart(2,'0')}`;

                    return (
                        <div className="px-4 mb-2 mt-2 flex items-stretch gap-3">
                            {/* שעון */}
                            {/* שעון — רקע זהה לתאריכים */}
                            <div className={`flex flex-col items-center justify-center gap-2 rounded-2xl px-4 py-3 border shrink-0 transition-all
                                ${isWorkoutComplete
                                    ? 'bg-emerald-500 border-emerald-400 text-white'
                                    : isWorkoutActive
                                        ? 'bg-blue-600 border-blue-500 text-white'
                                        : 'bg-gradient-to-br from-blue-50 to-indigo-50 border-blue-100 text-slate-700'}`}>
                                <button onClick={()=>setIsWorkoutActive(v=>!v)} className="flex flex-col items-center gap-1 active:scale-95 transition-transform">
                                    <Icon name={isWorkoutActive?'Pause':'Play'} size={18} />
                                    <span className="font-mono text-[15px] font-black tracking-widest leading-none" dir="ltr">{timerStr}</span>
                                </button>
                                <button onClick={()=>requestConfirm('לאפס סטופר?',()=>setWorkoutSec(0))}
                                    className={`text-[13px] font-bold flex items-center gap-1 px-2 py-1 rounded-full transition-colors
                                        ${isWorkoutActive ? 'bg-white/20 text-white' : 'bg-blue-100 text-blue-500'}`}>
                                    <Icon name="RotateCcw" size={11} /> אפס
                                </button>
                            </div>

                            {/* תאריכים + מד */}
                            <div onClick={()=>{
                                        setEditingDates({start:sessionStartTime, end:sessionEndTime});
                            }}
                                className="flex-1 rounded-2xl bg-gradient-to-br from-blue-50 to-indigo-50 border border-blue-100 px-4 py-3 cursor-pointer active:scale-[0.98] transition-all touch-manipulation select-none"
                                style={{WebkitUserSelect:'none'}}>
                                <div className="flex justify-between items-start mb-2">
                                    <div>
                                        <div className="text-[9px] font-bold text-blue-400 uppercase tracking-wide mb-0.5">התחלה</div>
                                        <div className="text-[15px] font-black text-slate-800 leading-none">{start.toLocaleDateString('he-IL')}</div>
                                    </div>
                                    <div className="text-right">
                                        <div className="text-[9px] font-bold text-blue-400 uppercase tracking-wide mb-0.5">סוף</div>
                                        <div className="text-[15px] font-black text-slate-800 leading-none">{end?.toLocaleDateString('he-IL') || '—'}</div>
                                    </div>
                                </div>
                                <div className="h-2 bg-white/70 rounded-full overflow-hidden mb-2 shadow-inner">
                                    <div className="h-full bg-gradient-to-r from-blue-400 to-indigo-500 rounded-full transition-all duration-500"
                                        style={{width:`${progress}%`}} />

                                <div className="flex items-center justify-between">
                                    <span className="text-[14px] font-black text-indigo-600">

                                    </span>
                                    <button onClick={e=>{e.stopPropagation();setMusicPanelOpen(o=>!o)}}
                                        className={`w-8 h-8 rounded-full flex items-center justify-center transition-all active:scale-90 shrink-0

                                        <Icon name="Music" size={15} />
                                    </button>
                                </div>
                            </div>
                        </div>
                    );
                })()}
                {/* נגן מוזיקה */}
                {musicPanelOpen && (
                    <div className="mx-4 mb-3 bg-slate-900 rounded-2xl px-4 py-3 space-y-2" dir="rtl">
                        {/* רשימת שירים */}
                        {musicList.length > 0 && (
                            <div className="space-y-1 max-h-36 overflow-y-auto no-scrollbar">
                                {musicList.map((t,i) => (
                                    <div key={t.id} className={`flex items-center gap-2 px-2 py-1.5 rounded-xl ${i===musicIndex?'bg-purple-800/60':'bg-slate-800/50'}`}>
                                        <button onClick={()=>{ const a=audioRef.current; if(a){ a.src=t.url; a.play().catch(e=>showToast(e.message||'שגיאת פליי',true)); } setMusicIndex(i); }}
                                            className={`text-[11px] shrink-0 ${i===musicIndex&&musicPlaying?'text-green-400':'text-slate-400'}`}>
                                            {i===musicIndex&&musicPlaying?'▶':'○'}

                                        <button onClick={()=>handleMusicRemoveOne(t.id)} className="text-slate-500 active:text-red-400 shrink-0">
                                            <Icon name="Trash2" size={11}/>

                                    </div>
                                ))}
                            </div>

                                <button onClick={()=>{ const a=audioRef.current; if(!a)return; if(musicPlaying){a.pause();}else{ if(!a.src&&musicList[musicIndex]?.url){a.src=musicList[musicIndex].url;} a.play().catch(e=>showToast(e.message||'שגיאת פליי',true)); } }}
                                    className={`px-3 py-1.5 rounded-xl text-[11px] font-black active:scale-95 shrink-0 ${musicPlaying?'bg-rose-500 text-white':'bg-emerald-500 text-white'}`}>
                                    {musicPlaying?'⏸':'▶'}
                                </button>
